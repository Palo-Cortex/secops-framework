# ============================================================
# SOC Framework Replay Scenario Manifest
# Scenario: Turla Carbon — ProofPoint TAP + CrowdStrike Falcon
# ============================================================
# Usage: python3 tools/replay_scenario.py \
#          --manifest scenarios/turla_carbon_proofpoint_crowdstrike.yml
#
# Shadow Mode: All C/E/R actions write to xsiam_socfw_ir_execution_raw
#              with execution_mode: "shadow". No vendor commands fire
#              until SOCFrameworkActions_V3 shadow_mode is flipped to false.
#
# Products activated: Email (ProofPoint TAP), Endpoint (CrowdStrike Falcon)
# Value Drivers: VD1 (MTTD/MTTC/MTTR), VD2 (Universal Command), VD3 (automation %)
# ============================================================

scenario_id: turla_carbon_proofpoint_crowdstrike
scenario_name: "Turla Carbon - ProofPoint TAP + CrowdStrike Falcon"
scenario_version: "1.0.0"
author: "SOC Framework"
description: >
  Simulates the full Turla Carbon APT kill chain: spearphish delivery via
  ProofPoint TAP triggers Email Analysis, Carbon dropper execution on a
  CrowdStrike-protected endpoint triggers Endpoint Containment/Eradication/Recovery.
  Two-product chain exercises Email + Endpoint playbook paths end-to-end.

mitre_chain:
  - tactic: "Initial Access"
    tactic_id: "TA0001"
    technique: "Phishing: Spearphishing Link"
    technique_id: "T1566.002"
  - tactic: "Execution"
    tactic_id: "TA0002"
    technique: "User Execution: Malicious Link"
    technique_id: "T1204.001"
  - tactic: "Persistence"
    tactic_id: "TA0003"
    technique: "Create or Modify System Process: Windows Service"
    technique_id: "T1543.003"
  - tactic: "Command and Control"
    tactic_id: "TA0011"
    technique: "Application Layer Protocol: Web Protocols"
    technique_id: "T1071.001"
  - tactic: "Lateral Movement"
    tactic_id: "TA0008"
    technique: "Remote Services: SMB/Windows Admin Shares"
    technique_id: "T1021.002"
  - tactic: "Collection"
    tactic_id: "TA0009"
    technique: "Archive Collected Data: Archive via Utility"
    technique_id: "T1560.001"

products_covered:
  - product: ProofPoint TAP
    soc_framework_category: Email
    dataset: proofpoint_tap_raw

  - product: CrowdStrike Falcon
    soc_framework_category: Endpoint
    dataset: external_edr_raw

value_drivers:
  - VD1  # Reduce Risk — MTTD/MTTC/MTTR timestamp deltas in xsiam_socfw_ir_execution_raw
  - VD2  # Simplify Ops — Universal Command handles both Falcon isolate + PP block
  - VD3  # Efficiency — automation % across Email + Endpoint categories

