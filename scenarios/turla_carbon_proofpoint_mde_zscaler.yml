# ============================================================
# SOC Framework Replay Scenario Manifest
# Scenario: Turla Carbon - ProofPoint TAP + Microsoft Defender for Endpoint + Zscaler ZPA
# ============================================================
# Usage: python3 tools/replay_scenario.py \
#          --manifest scenarios/turla_carbon_proofpoint_mde_zscaler.yml
#
# Shadow Mode: All C/E/R actions write to xsiam_socfw_ir_execution_raw
#              with execution_mode: "shadow". No vendor commands fire
#              until SOCFrameworkActions_V3 shadow_mode is flipped to false.
#
# Products activated:
#   Email    — ProofPoint TAP   → proofpoint_tap_raw
#   Endpoint — Microsoft Defender for Endpoint → ms_defender_edr_raw
#   Network  — Zscaler ZPA       → zscaler_zpa_raw
#
# ZPA story: Carbon implant authenticates to ZPA from 185.220.101.47
# (Tor exit node) concurrent with C2 beacon. Tunnels lateral movement
# across LDAP recon → SMB file access → lateral target → mgmt RPC →
# admin console → backup server → wmimetricsq-relay C2 relay endpoint.
# soc-terminate-zpa-session kills all 7 connections simultaneously.
# Dataset: zscaler_zpa_raw (NOT zscaler_zia_raw — ZPA is private app
# access / lateral movement tunnel, not internet URL filtering).
# ============================================================

scenario_id: turla_carbon_proofpoint_mde_zscaler
scenario_name: Turla Carbon - ProofPoint TAP + Microsoft Defender for Endpoint + Zscaler
  ZPA
scenario_version: 1.0.0
author: SOC Framework
description: 'Full three-product Turla Carbon kill chain. ProofPoint TAP fires the
  Email Analysis path. Microsoft Defender for Endpoint fires the Endpoint path via
  ms_defender_edr_raw (dropper, orchestrator persistence, C2 beacon, lateral movement,
  data staging). Zscaler ZPA fires the Network path: Carbon implant authenticates
  to ZPA from 185.220.101.47 (Tor exit node) and tunnels lateral movement across LDAP,
  SMB, management, admin console, backup, and a wmimetricsq-relay C2 relay endpoint.
  Demonstrates vendor-agnostic Endpoint path: same Universal Command isolates MDE
  as Falcon, parallel ZPA session terminate on the network plane.'
