# ============================================================
# SOC Framework Replay Scenario Manifest
# Scenario: Turla Carbon — ProofPoint TAP + Microsoft Defender for Endpoint
# ============================================================
# Usage: python3 tools/replay_scenario.py \
#          --manifest scenarios/turla_carbon_proofpoint_mde.yml
#
# Shadow Mode: All C/E/R actions write to xsiam_socfw_ir_execution_raw
#              with execution_mode: "shadow". No vendor commands fire
#              until SOCFrameworkActions_V3 shadow_mode is flipped to false.
#
# Products activated: Email (ProofPoint TAP), Endpoint (Microsoft Defender for Endpoint)
# Value Drivers: VD1, VD2 (Universal Command abstracts MDE isolate/remediate), VD3
# ============================================================

scenario_id: turla_carbon_proofpoint_mde
scenario_name: "Turla Carbon - ProofPoint TAP + Microsoft Defender for Endpoint"
scenario_version: "1.0.0"
author: "SOC Framework"
description: >
  Turla Carbon kill chain with Microsoft Defender for Endpoint as the detection
  platform. MDE surfaces alerts via the ms_defender_edr_raw dataset.
  Demonstrates that the SOC Framework Endpoint path is vendor-agnostic — the
  same soc-isolate-endpoint Universal Command targets MDE with no playbook
  changes vs. CrowdStrike or SentinelOne variants.

mitre_chain:
  - tactic: "Initial Access"
    tactic_id: "TA0001"
    technique: "Phishing: Spearphishing Link"
    technique_id: "T1566.002"
  - tactic: "Execution"
    tactic_id: "TA0002"
    technique: "User Execution: Malicious Link"
    technique_id: "T1204.001"
  - tactic: "Persistence"
    tactic_id: "TA0003"
    technique: "Create or Modify System Process: Windows Service"
    technique_id: "T1543.003"
  - tactic: "Command and Control"
    tactic_id: "TA0011"
    technique: "Application Layer Protocol: Web Protocols"
    technique_id: "T1071.001"
  - tactic: "Lateral Movement"
    tactic_id: "TA0008"
    technique: "Remote Services: SMB/Windows Admin Shares"
    technique_id: "T1021.002"
  - tactic: "Collection"
    tactic_id: "TA0009"
    technique: "Archive Collected Data: Archive via Utility"
    technique_id: "T1560.001"

products_covered:
  - product: ProofPoint TAP
    soc_framework_category: Email
    dataset: proofpoint_tap_raw

  - product: Microsoft Defender for Endpoint
    soc_framework_category: Endpoint
    dataset: ms_defender_edr_raw

value_drivers:
  - VD1
  - VD2  # Universal Command — MDE isolate/offboard same interface as Falcon/S1
  - VD3

