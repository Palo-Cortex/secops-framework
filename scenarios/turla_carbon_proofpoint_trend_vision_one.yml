# ============================================================
# SOC Framework Replay Scenario Manifest
# Scenario: Turla Carbon — ProofPoint TAP + Trend Micro Vision One
# ============================================================
# Usage: python3 tools/replay_scenario.py \
#          --manifest scenarios/turla_carbon_proofpoint_trend_vision_one.yml
#
# Shadow Mode: All C/E/R actions write to xsiam_socfw_ir_execution_raw
#              with execution_mode: "shadow". No vendor commands fire
#              until SOCFrameworkActions_V3 shadow_mode is flipped to false.
#
# Products activated: Email (ProofPoint TAP), Endpoint (Trend Micro Vision One)
# Value Drivers: VD1 (MTTD/MTTC/MTTR), VD2 (Universal Command), VD3 (automation %)
#
# Key demo point: SOC Framework Endpoint path is vendor-agnostic.
# soc-isolate-endpoint Universal Command targets Vision One with no
# playbook changes vs. CrowdStrike, MDE, or SentinelOne variants.
# ============================================================

scenario_id: turla_carbon_proofpoint_trend_vision_one
scenario_name: "Turla Carbon - ProofPoint TAP + Trend Micro Vision One"
scenario_version: "1.0.0"
author: "SOC Framework"
description: >
  Simulates the full Turla Carbon APT kill chain: spearphish delivery via
  ProofPoint TAP triggers Email Analysis. Carbon dropper execution, persistence,
  masquerading, C2 beacon, lateral movement, and data staging are surfaced as
  Trend Micro Vision One Workbench alerts via trendmicro_vision_one_raw. Two-product
  chain exercises Email + Endpoint playbook paths end-to-end. Demonstrates that
  the SOC Framework Endpoint path is vendor-agnostic — the same Universal Command
  targets Vision One with no playbook changes vs. Falcon or MDE variants.

mitre_chain:
  - tactic: "Initial Access"
    tactic_id: "TA0001"
    technique: "Phishing: Spearphishing Link"
    technique_id: "T1566.002"
  - tactic: "Execution"
    tactic_id: "TA0002"
    technique: "User Execution: Malicious File"
    technique_id: "T1204.002"
  - tactic: "Persistence"
    tactic_id: "TA0003"
    technique: "Boot or Logon Autostart Execution: Registry Run Keys"
    technique_id: "T1547.001"
  - tactic: "Defense Evasion"
    tactic_id: "TA0005"
    technique: "Masquerading: Match Legitimate Name or Location"
    technique_id: "T1036.005"
  - tactic: "Defense Evasion"
    tactic_id: "TA0005"
    technique: "Process Injection: Dynamic-link Library Injection"
    technique_id: "T1055.001"
  - tactic: "Command and Control"
    tactic_id: "TA0011"
    technique: "Application Layer Protocol: Web Protocols"
    technique_id: "T1071.001"
  - tactic: "Lateral Movement"
    tactic_id: "TA0008"
    technique: "Remote Services: SMB/Windows Admin Shares"
    technique_id: "T1021.002"
  - tactic: "Collection"
    tactic_id: "TA0009"
    technique: "Data from Local System"
    technique_id: "T1005"

products_covered:
  - product: ProofPoint TAP
    soc_framework_category: Email
    dataset: proofpoint_tap_raw

  - product: Trend Micro Vision One
    soc_framework_category: Endpoint
    dataset: trendmicro_vision_one_raw

value_drivers:
  - VD1  # Reduce Risk — MTTD/MTTC/MTTR timestamp deltas in xsiam_socfw_ir_execution_raw
  - VD2  # Simplify Ops — Universal Command handles both TAP block + Vision One isolate
  - VD3  # Efficiency — automation % across Email + Endpoint categories

