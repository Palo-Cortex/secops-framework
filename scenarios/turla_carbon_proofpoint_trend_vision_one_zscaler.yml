# ============================================================
# SOC Framework Replay Scenario Manifest
# Scenario: Turla Carbon — ProofPoint TAP + Trend Micro Vision One + Zscaler ZPA
# ============================================================
# Usage: python3 tools/replay_scenario.py \
#          --manifest scenarios/turla_carbon_proofpoint_trend_vision_one_zscaler.yml
#
# Shadow Mode: All C/E/R actions write to xsiam_socfw_ir_execution_raw
#              with execution_mode: "shadow". No vendor commands fire
#              until SOCFrameworkActions_V3 shadow_mode is flipped to false.
#
# Products activated:
#   Email    — ProofPoint TAP          → proofpoint_tap_raw
#   Endpoint — Trend Micro Vision One  → trendmicro_vision_one_raw
#   Network  — Zscaler ZPA             → zscaler_zpa_raw
#
# ZPA story: After dropper executes on the endpoint, the Carbon implant
# (or attacker with stolen session credentials) authenticates to Zscaler
# ZPA from 185.220.101.47 — a known Tor exit node. The session tunnels
# lateral movement across multiple internal segments: LDAP recon → SMB
# file access → lateral target server → mgmt RPC → admin console →
# backup server → wmimetricsq-relay C2 relay endpoint.
# Response action: soc-terminate-zpa-session kills all tunneled access
# simultaneously across all open connections in the session.
#
# NOTE: This scenario uses zscaler_zpa_raw (private app access / lateral
# movement tunnel). It is NOT zscaler_zia_raw (internet URL filtering).
# These are two different Zscaler products with different response actions.
#
# Value Drivers: VD1, VD2, VD3, VD4
# ============================================================

scenario_id: turla_carbon_proofpoint_trend_vision_one_zscaler
scenario_name: "Turla Carbon - ProofPoint TAP + Trend Micro Vision One + Zscaler ZPA"
scenario_version: "1.0.0"
author: "SOC Framework"
description: >
  Full three-product Turla Carbon kill chain. ProofPoint TAP fires the Email
  Analysis path. Trend Micro Vision One fires the Endpoint path via Workbench
  alerts (dropper, persistence, masquerading, C2, lateral movement, data staging).
  Zscaler ZPA fires the Network path: the Carbon implant authenticates to ZPA
  from 185.220.101.47 (Tor exit node) and tunnels lateral movement across LDAP,
  SMB, management, admin console, backup, and a wmimetricsq-relay C2 endpoint —
  all inside a single hijacked ZPA session (TurlaGunter-SessionCarbon25).
  soc-terminate-zpa-session in Shadow Mode kills the entire tunnel simultaneously.
  Demonstrates cross-category parallel NIST IR response: Endpoint isolate +
  Network session terminate driven from one incident.

mitre_chain:
  - tactic: "Initial Access"
    tactic_id: "TA0001"
    technique: "Phishing: Spearphishing Link"
    technique_id: "T1566.002"
  - tactic: "Execution"
    tactic_id: "TA0002"
    technique: "User Execution: Malicious File"
    technique_id: "T1204.002"
  - tactic: "Persistence"
    tactic_id: "TA0003"
    technique: "Boot or Logon Autostart Execution: Registry Run Keys"
    technique_id: "T1547.001"
  - tactic: "Defense Evasion"
    tactic_id: "TA0005"
    technique: "Masquerading: Match Legitimate Name or Location"
    technique_id: "T1036.005"
  - tactic: "Command and Control"
    tactic_id: "TA0011"
    technique: "Application Layer Protocol: Web Protocols"
    technique_id: "T1071.001"
  - tactic: "Lateral Movement"
    tactic_id: "TA0008"
    technique: "Remote Services: SMB/Windows Admin Shares"
    technique_id: "T1021.002"
  - tactic: "Collection"
    tactic_id: "TA0009"
    technique: "Data from Local System"
    technique_id: "T1005"

products_covered:
  - product: ProofPoint TAP
    soc_framework_category: Email
    dataset: proofpoint_tap_raw

  - product: Trend Micro Vision One
    soc_framework_category: Endpoint
    dataset: trendmicro_vision_one_raw

  - product: Zscaler ZPA
    soc_framework_category: Network
    dataset: zscaler_zpa_raw

value_drivers:
  - VD1  # MTTD/MTTC/MTTR — Endpoint isolate + ZPA session terminate compress MTTC
  - VD2  # Universal Command — Vision One isolate + soc-terminate-zpa-session, one interface
  - VD3  # Efficiency — Email + Endpoint + Network automation in parallel
  - VD4  # Attack surface down — ZPA session terminate blocks all tunneled lateral movement

