# Turla Carbon — Full kill chain: ProofPoint TAP initial access + CrowdStrike execution
# Use this to demonstrate XSIAM grouping engine correlating email delivery → endpoint compromise.
# Both sources share a time axis so the chain lands in correct order within the compress window.

scenario: Turla Carbon — Full Kill Chain
compress_window: 2h

sources:
  - name: ProofPoint TAP
    file: input_tsv/ProofPoint-MITRE-Turla-Carbon-in-XSIAM.tsv
    env: .env-httpcollector-proofpoint

  - name: CrowdStrike
    file: input_tsv/CrowdStrike-MITRE-Turla-Carbon-in-XSIAM.tsv
    env: .env-httpcollector-crowdstrike
