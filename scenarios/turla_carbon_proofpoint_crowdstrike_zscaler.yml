# ============================================================
# SOC Framework Replay Scenario Manifest
# Scenario: Turla Carbon - ProofPoint TAP + CrowdStrike Falcon + Zscaler ZPA
# ============================================================
# Usage: python3 tools/replay_scenario.py \
#          --manifest scenarios/turla_carbon_proofpoint_crowdstrike_zscaler.yml
#
# Shadow Mode: All C/E/R actions write to xsiam_socfw_ir_execution_raw
#              with execution_mode: "shadow". No vendor commands fire
#              until SOCFrameworkActions_V3 shadow_mode is flipped to false.
#
# Products activated:
#   Email    — ProofPoint TAP   → proofpoint_tap_raw
#   Endpoint — CrowdStrike Falcon   → external_edr_raw
#   Network  — Zscaler ZPA       → zscaler_zpa_raw
#
# ZPA story: Carbon implant authenticates to ZPA from 185.220.101.47
# (Tor exit node) concurrent with C2 beacon. Tunnels lateral movement
# across LDAP recon → SMB file access → lateral target → mgmt RPC →
# admin console → backup server → wmimetricsq-relay C2 relay endpoint.
# soc-terminate-zpa-session kills all 7 connections simultaneously.
# Dataset: zscaler_zpa_raw (NOT zscaler_zia_raw — ZPA is private app
# access / lateral movement tunnel, not internet URL filtering).
# ============================================================

