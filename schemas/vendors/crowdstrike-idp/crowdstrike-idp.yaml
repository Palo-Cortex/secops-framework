  contributes:
  - Endpoint.User
  - Endpoint.Host
  - Endpoint.Process
  cie_overlay: |
    | filter timestamp_diff(time_frame_end(), _insert_time, "MINUTE") <= 15

    | alter ids_join_key = lowercase(coalesce(source_account_object_sid, src_account_sid))
    | join type = left (
        dataset = socfw_identity_map
        | filter timestamp_diff(time_frame_end(), _insert_time, "HOUR") <= 25
        | filter type in ("user", "computer")
        | alter ids_join_key = lowercase(coalesce(on_prem_sid, sid))
        | dedup ids_join_key by asc netbios_and_sam_account_name
        | fields ids_join_key,
                 sid               as ids_sid,
                 on_prem_sid       as ids_on_prem_sid,
                 upn               as ids_upn,
                 email             as ids_email,
                 display_name      as ids_display_name,
                 domain_name       as ids_domain_name,
                 sam_account_name  as ids_sam_account_name,
                 netbios_and_sam_account_name as ids_netbios
      ) as ids ids_join_key = ids.ids_join_key

    | alter idu_join_key = lowercase(coalesce(
            if(user_principal contains "@", user_principal, null),
            if(user_name      contains "@", user_name,      null)))
    | join type = left (
        dataset = socfw_identity_map
        | filter timestamp_diff(time_frame_end(), _insert_time, "HOUR") <= 25
        | filter type = "user"
        | alter idu_join_key = lowercase(coalesce(upn, email))
        | dedup idu_join_key by asc netbios_and_sam_account_name
        | fields idu_join_key,
                 sid               as idu_sid,
                 on_prem_sid       as idu_on_prem_sid,
                 upn               as idu_upn,
                 email             as idu_email,
                 display_name      as idu_display_name,
                 domain_name       as idu_domain_name,
                 sam_account_name  as idu_sam_account_name,
                 netbios_and_sam_account_name as idu_netbios
      ) as idu idu_join_key = idu.idu_join_key

    | alter idsam_join_key = raw_sam
    | join type = left (
        dataset = socfw_identity_map
        | filter timestamp_diff(time_frame_end(), _insert_time, "HOUR") <= 25
        | filter type in ("user", "computer")
        | alter idsam_join_key = lowercase(sam_account_name)
        | dedup idsam_join_key by asc netbios_and_sam_account_name
        | fields idsam_join_key,
                 sid               as idsam_sid,
                 on_prem_sid       as idsam_on_prem_sid,
                 upn               as idsam_upn,
                 email             as idsam_email,
                 display_name      as idsam_display_name,
                 domain_name       as idsam_domain_name,
                 sam_account_name  as idsam_sam_account_name,
                 netbios_and_sam_account_name as idsam_netbios
      ) as idsam idsam_join_key = idsam.idsam_join_key

    | alter cie_sid         = coalesce(ids_sid, idu_sid, idsam_sid),
            cie_on_prem_sid = coalesce(ids_on_prem_sid, idu_on_prem_sid, idsam_on_prem_sid),
            cie_upn         = coalesce(ids_upn, idu_upn, idsam_upn),
            cie_email       = coalesce(ids_email, idu_email, idsam_email),
            cie_display     = coalesce(ids_display_name, idu_display_name, idsam_display_name),
            cie_domain      = coalesce(ids_domain_name, idu_domain_name, idsam_domain_name),
            cie_sam         = coalesce(ids_sam_account_name, idu_sam_account_name, idsam_sam_account_name),
            cie_netbios     = coalesce(ids_netbios, idu_netbios, idsam_netbios)

    | alter idr_host_join_key = lowercase(hostname)
    | join type = left (
        dataset = socfw_identity_map
        | filter type = "computer"
        | alter idr_host_join_key = lowercase(name)
        | dedup idr_host_join_key by desc _time
        | fields idr_host_join_key,
                 sid            as idr_host_sid,
                 dns_host_name  as idr_host_dns_name,
                 domain_name    as idr_host_domain_name,
                 os             as idr_host_os
      ) as idrh idr_host_join_key = idrh.idr_host_join_key

    | alter crowdstrike_original_display_name   = display_name,
            crowdstrike_original_user_principal = user_principal,
            crowdstrike_original_actor          = actor_effective_username

    | alter idr_sid              = coalesce(cie_sid, idr_sid),
            idr_on_prem_sid      = coalesce(cie_on_prem_sid, idr_on_prem_sid),
            idr_upn              = coalesce(cie_upn, idr_upn),
            idr_email            = coalesce(cie_email, idr_email),
            idr_display_name     = coalesce(cie_display, cie_sam, idr_display_name),
            idr_domain_name      = coalesce(cie_domain, idr_domain_name),
            idr_sam_account_name = coalesce(cie_sam, idr_sam_account_name),
            idr_netbios          = coalesce(cie_netbios, idr_netbios)

    | alter display_name             = coalesce(idr_display_name, idr_sam_account_name, display_name),
            user_principal           = coalesce(idr_upn, user_principal),
            email                    = idr_email,
            actor_effective_username = lowercase(coalesce(idr_email, idr_upn, idr_netbios, actor_effective_username))

    | alter alert_name = concat(
        "[Identity] ",
        coalesce(actor_effective_username, display_name, hostname, "Unknown"),
        " - ",
        coalesce(tactic, "Detection"),
        ": ",
        coalesce(technique, name)
      )
    | alter originalalertname = alert_name
  cie_schedule:
    crontab: '*/10 * * * *'
    search_window: 25 hours
    simple_schedule: 10 minutes
