modeling_rule:
  fromversion: 8.3.1
  modeling_rule_id: SOC_CrowdStrikeFalcon_ModelingRule
  modeling_rule_name: SOC CrowdStrike Falcon Modeling Rule
  directory_name: SOCCrowdStrikeFalconModelingRules
  raw_xif: |
    [MODEL: dataset=crowdstrike_falcon_event_raw]
    filter product = "epp"
    | alter
        xdm.source.user.username = user_name,
        xdm.source.user.upn = user_principal,
        xdm.source.user.domain = source_account_domain,
        xdm.source.user.sam_account_name = source_account_sam_account_name,
        xdm.source.user.identifier = coalesce(user_id, source_account_object_sid),
        xdm.source.user.groups = device->groups[],
        xdm.target.user.username = target_account_name,
        xdm.source.host.hostname = coalesce(device->hostname, arrayindex(json_extract_array(host_names, "$"), 0), source_endpoint_host_name),
        xdm.source.host.device_id = agent_id,
        xdm.source.agent.identifier = agent_id,
        xdm.source.host.os = device->os_version,
        xdm.source.host.ipv4_addresses = arraycreate(coalesce(device->local_ip, source_endpoint_address_ip4)),
        xdm.source.ipv4 = coalesce(device->local_ip, source_endpoint_address_ip4),
        xdm.target.host.hostname = coalesce(target_endpoint_host_name, arrayindex(json_extract_array(destination_hosts, "$"), 0)),
        xdm.target.agent.identifier = target_endpoint_sensor_id,
        xdm.source.process.name = filename,
        xdm.source.process.executable.path = filepath,
        xdm.source.process.executable.sha256 = sha256,
        xdm.source.process.executable.md5 = md5,
        xdm.source.process.command_line = cmdline,
        xdm.source.process.pid = to_integer(local_process_id),
        xdm.source.process.parent_id = parent_process_id,
        xdm.alert.severity = concat(to_string(severity), " - ", severity_name),
        xdm.alert.name = coalesce(name, display_name),
        xdm.alert.category = objective,
        xdm.alert.description = description,
        xdm.alert.mitre_tactics = arraycreate(tactic_id),
        xdm.alert.mitre_techniques = arraycreate(technique_id),
        xdm.event.type = coalesce(incident_type, type),
        xdm.event.original_event_type = incident_type,
        xdm.event.description = description,
        xdm.event.id = coalesce(id, composite_id),
        xdm.observer.vendor = "CrowdStrike",
        xdm.observer.product = "Falcon Insight",
        xdm.observer.unique_identifier = cid;
    filter product = "idp"
    | alter
        xdm.source.user.username = coalesce(source_account_upn, source_account_name, user_principal, user_name),
        xdm.source.user.upn = coalesce(source_account_upn, user_principal),
        xdm.source.user.domain = source_account_domain,
        xdm.source.user.sam_account_name = source_account_sam_account_name,
        xdm.source.user.identifier = source_account_object_sid,
        xdm.target.user.username = target_account_name,
        xdm.target.user.identifier = target_account_object_sid,
        xdm.source.host.hostname = coalesce(source_endpoint_host_name, source_hosts, host_names),
        xdm.source.host.device_id = source_endpoint_account_object_guid,
        xdm.source.host.ipv4_addresses = arraycreate(source_endpoint_address_ip4),
        xdm.target.host.hostname = coalesce(target_endpoint_host_name, destination_hosts),
        xdm.target.agent.identifier = target_endpoint_sensor_id,
        xdm.source.ipv4 = coalesce(source_endpoint_address_ip4, source_endpoint_ip_address),
        xdm.source.ipv6 = source_endpoint_address_ip6,
        xdm.source.location.country = location_country_code,
        xdm.source.asn.as_name = source_ip_asn_organization,
        xdm.target.application.name = sso_application_identifier,
        xdm.target.url = sso_application_uri,
        xdm.alert.severity = concat(to_string(severity), " - ", severity_name),
        xdm.alert.name = name,
        xdm.alert.category = objective,
        xdm.alert.mitre_tactics = arraycreate(tactic_id),
        xdm.alert.mitre_techniques = arraycreate(technique_id),
        xdm.event.type = coalesce(incident_type, type),
        xdm.event.original_event_type = incident_type,
        xdm.event.description = description,
        xdm.event.id = coalesce(id, composite_id),
        xdm.observer.vendor = "CrowdStrike",
        xdm.observer.product = "Falcon Identity Protection",
        xdm.observer.unique_identifier = cid;
    filter product = "saas-security"
    | alter
        xdm.source.user.username = coalesce(user_name, arrayindex(json_extract_array(user_names, "$"), 0)),
        xdm.source.user.upn = user_name,
        xdm.source.location.country = country,
        xdm.source.asn.as_number = to_integer(asn),
        xdm.source.asn.as_name = asn_name,
        xdm.alert.severity = concat(to_string(severity), " - ", severity_name),
        xdm.alert.name = coalesce(name, display_name),
        xdm.alert.category = coalesce(category, objective),
        xdm.alert.description = coalesce(description, event_summary),
        xdm.alert.mitre_tactics = json_extract_array(mitre_attack, "$[*].tactic_id"),
        xdm.alert.mitre_techniques = json_extract_array(mitre_attack, "$[*].technique_id"),
        xdm.event.type = coalesce(incident_type, type),
        xdm.event.original_event_type = type,
        xdm.event.description = coalesce(description, event_summary),
        xdm.event.id = coalesce(id, composite_id),
        xdm.observer.vendor = "CrowdStrike",
        xdm.observer.product = "Falcon SaaS Security",
        xdm.observer.unique_identifier = cid;
  contributes: [User, User.UPN, User.SAM, User.SID, User.Domain, Target.User, Target.User.SID, Endpoint.Hostname, Endpoint.DeviceID, Endpoint.OS, Endpoint.IPv4, Target.Hostname, Process.Name, Process.Path, Process.SHA256, Process.MD5, Process.CommandLine, Process.PID, Network.IP, Network.Location, Network.ASN, Application, Alert.Severity, Alert.Category, Alert.Description, Alert.MITRE, Event.Type, Event.Description, Event.ID, Observer.Vendor, Observer.Product]

correlation_rules:
- subtype: passthrough
  fromversion: 6.10.0
  global_rule_id: SOC CrowdStrike Falcon - Endpoint All Alerts
  name: SOC CrowdStrike Falcon - Endpoint All Alerts
  description: Creates a single XSIAM alert for each CrowdStrike Falcon Endpoint Detection event. Consolidates 15 per-tactic rules from v1.0.14 into one rule using MITRE tactic as the User Defined alert category. Backwards compatible with alert field mappings from all 1.0.14 per-tactic rules.
  alert_name: SOC CrowdStrike Falcon - $alert_name
  alert_description: '''$alert_description | User: $actor_effective_username | Display Name: $display_name | Email: $idr_email | UPN: $idr_upn | Domain: $idr_domain_name | SAM: $idr_sam_account_name | SID: $idr_sid | On-Prem SID: $idr_on_prem_sid | NetBIOS: $idr_netbios'''
  alert_type: null
  crontab: null
  search_window: null
  simple_schedule: null
  timezone: UTC
  mitre_defs: {}
  investigation_query_link: 'dataset = xdr_data

    | filter agent_hostname = $hostname

    | fields *'
  schema_constants:
    rule_id: 0
    action: ALERTS
    alert_category: User Defined
    alert_domain: DOMAIN_SECURITY
    execution_mode: REAL_TIME
    is_enabled: true
    mapping_strategy: CUSTOM
    severity: User Defined
    drilldown_query_timeframe: ALERT
    user_defined_category: tactic
    user_defined_severity: severity_name
  suppression:
    enabled: true
    duration: 1 hours
    fields:
    - composite_id
  pre_alter: "| alter vendor_name = \"CrowdStrike\", product_name = \"Falcon\"\n\n| filter product = \"epp\"\n\n| alter originalrawlog = to_json_string(rawJSON)\n\n| alter severity_int_raw = severity\n\n| alter\n        tactic                 = if(tactic = \"Malware\", \"Execution\", tactic),\n        mitre_tactic           = if(tactic = \"Malware\", \"Execution\", tactic),\n        mitre_tactic_id        = tactic_id,\n        mitre_technique        = technique,\n        mitre_technique_id     = technique_id\n\n| alter mitre_ids_str = if(\n    technique_id != null and technique != null,\n    concat(technique_id, \" - \", technique),\n    coalesce(technique_id, technique)\n  )\n\n| alter\n        hostname                     = device->hostname,\n        domain                       = device->machine_domain,\n        local_ip                     = device->local_ip,\n        external_ip                  = device->external_ip,\n        mac_address                  = device->mac_address,\n        device_id                    = device->device_id,\n        device_ou                    = device->ou[],\n        parent_process_name          = parent_details->filename,\n        parent_process_cmd           = parent_details->cmdline,\n        parent_process_path          = parent_details->filepath,\n        parent_process_sha256        = parent_details->sha256,\n        parent_local_process_id      = parent_details->local_process_id,\n        grandparent_process_name     = grandparent_details->filename,\n        grandparent_process_cmd      = grandparent_details->cmdline,\n        grandparent_process_path     = grandparent_details->filepath,\n        grandparent_process_sha256   = grandparent_details->sha256,\n        grandparent_local_process_id = grandparent_details->local_process_id\n\n| alter device_ou_arr = arraymap(device_ou, replace(\"@element\", \"\\\"\", \"\"))\n\n| alter cgo_name = if(lowercase(grandparent_process_name) not in (\"wininit.exe\", \"userinit.exe\"),\n                      grandparent_process_name,\n                      coalesce(parent_process_name, filename)),\n        cgo_path = if(lowercase(grandparent_process_name) not in (\"wininit.exe\", \"userinit.exe\"),\n                      grandparent_process_path,\n                      coalesce(parent_process_path, filepath)),\n        cgo_cmd  = if(lowercase(grandparent_process_name) not in (\"wininit.exe\", \"userinit.exe\"),\n                      grandparent_process_cmd,\n                      coalesce(parent_process_cmd, cmdline))\n\n| alter dns_queries = dns_requests\n| alter remote_ips  = network_accesses\n\n| alter alert_name = concat(\n    \"[Endpoint] \",\n    coalesce(user_name, hostname, \"Unknown\"),\n    \" - \",\n    coalesce(tactic, \"Detection\"),\n    \": \",\n    coalesce(technique, name)\n  )\n\n| alter alert_description = concat(\n    coalesce(description, name),\n    \" | Host: \",  coalesce(hostname, \"Unknown\"),\n    \" | User: \",  coalesce(user_name, \"Unknown\"),\n    \" | Severity: \", coalesce(severity_name, \"Unknown\")\n  )\n\n| alter\n        vendor                              = vendor_name,\n        product                             = product_name,\n        originalalertid                     = composite_id,\n        originalalertname                   = alert_name,\n        originalalertsource                 = \"CrowdStrike Falcon\",\n        externallink                        = falcon_host_link,\n        alert_description                   = alert_description,\n        severity                            = severity_name,\n        mitretacticid                       = mitre_tactic_id,\n        mitretacticname                     = mitre_tactic,\n        mitretechniqueid                    = mitre_technique_id,\n        mitretechniquename                  = mitre_technique,\n        agent_hostname                      = hostname,\n        agent_id                            = agent_id,\n        agent_device_domain                 = domain,\n        actor_effective_username            = user_name,\n        actor_process_image_name            = filename,\n        actor_process_image_path            = filepath,\n        actor_process_image_sha256          = sha256,\n        actor_process_command_line          = cmdline,\n        actor_process_os_pid                = local_process_id,\n        causality_actor_process_image_name  = cgo_name,\n        causality_actor_process_image_path  = cgo_path,\n        causality_actor_process_image_sha256 = grandparent_process_sha256,\n        action_file_name                    = filename,\n        action_file_path                    = filepath,\n        action_file_sha256                  = sha256,\n        action_local_ip                     = local_ip,\n        action_remote_ip                    = remote_ips\n| fields\n    device_id, local_ip, user_name, user_principal, cmdline, sha256, domain, hostname, agent_id, pattern_disposition_description, pattern_disposition_details, cgo_cmd, cgo_name, cgo_path, template_instance_id, external_ip, falcon_host_link, mac_address, mitre_tactic_id, mitre_tactic, mitre_technique_id, mitre_technique, mitre_ids_str, tactic_id, tactic, technique_id, technique, objective, composite_id, parent_process_cmd, parent_process_name, parent_local_process_id, parent_process_path, parent_process_sha256, grandparent_process_name, grandparent_process_cmd, grandparent_process_path, grandparent_process_sha256, grandparent_local_process_id, device_ou_arr, process_start_time, local_process_id, md5, scenario, severity_name, aggregate_id, indicator_id, alert_name, alert_description, network_accesses, dns_requests, files_written, originalrawlog, *"
  alert_fields:
