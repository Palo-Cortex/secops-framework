modeling_rule:
  fromversion: 8.3.1
  modeling_rule_id: SOC_CrowdStrikeFalcon_ModelingRule
  modeling_rule_name: SOC CrowdStrike Falcon Modeling Rule
  directory_name: SOCCrowdStrikeFalconModelingRules
  filter:
    expression: product = "epp"
    notes: 'Restricts the rule to EPP detection events. Other Falcon products

      (CSPM, Identity Protection, etc.) ride other product values on the

      same dataset and are out of scope for the Endpoint category.

      '
  fields:
  - xdm_path: xdm.alert.severity
    expression: concat(to_string(severity), " - ", severity_name)
    sources:
    - severity
    - severity_name
    issue_field: severity
    notes: Composite — vendor int + name pair joined for analyst readability.
  - xdm_path: xdm.event.original_event_type
    expression: incident_type
    sources:
    - incident_type
    issue_field: original_event_type
  - xdm_path: xdm.event.type
    expression: incident_type
    sources:
    - incident_type
    issue_field: event_type
    notes: Same source as original_event_type — duplicate mapping, intentional.
  - xdm_path: xdm.event.description
    expression: description
    sources:
    - description
    issue_field: alert_description
  - xdm_path: xdm.source.host.hostname
    expression: device->hostname
    sources:
    - device
    issue_field: hostname
  - xdm_path: xdm.source.host.fqdn
    expression: device->machine_domain
    sources:
    - device
    issue_field: hostfqdn
    notes: 'machine_domain is being mapped to fqdn here AND to user.domain below.

      In Falcon''s schema it''s the AD domain — fqdn would be hostname + machine_domain

      concatenated. Flag for review.

      '
  - xdm_path: xdm.source.host.os_family
    expression: device->os_version
    sources:
    - device
    issue_field: hostos
    notes: 'os_version is the OS version string (e.g., "Windows 10 Pro"); os_family

      should be the family enum. Should likely use XDM_CONST.OS_FAMILY_* via if() chain.

      '
  - xdm_path: xdm.source.ipv4
    expression: device->local_ip
    sources:
    - device
    issue_field: hostip
  - xdm_path: xdm.source.user.username
    expression: user_name
    sources:
    - user_name
    issue_field: username
  - xdm_path: xdm.source.user.domain
    expression: device->machine_domain
    sources:
    - device
    issue_field: userdomain
  - xdm_path: xdm.source.user.groups
    expression: device->groups[]
    sources:
    - device
    issue_field: usergroups
  - xdm_path: xdm.source.process.pid
    expression: to_integer(local_process_id)
    sources:
    - local_process_id
    issue_field: initiatorpid
  - xdm_path: xdm.source.process.name
    expression: parent_details->filename
    sources:
    - parent_details
    issue_field: initiatedby
    notes: Currently mapping PARENT process name into source.process slot.
  - xdm_path: xdm.source.process.executable.path
    expression: parent_details->filepath
    sources:
    - parent_details
    issue_field: initiatorpath
  - xdm_path: xdm.source.process.executable.sha256
    expression: parent_details->sha256
    sources:
    - parent_details
    issue_field: initiatorsha256
  - xdm_path: xdm.source.process.command_line
    expression: parent_details->cmdline
    sources:
    - parent_details
    issue_field: initiatorcmd
  contributes:
  - Endpoint.Hostname
  - Endpoint.FQDN
  - Endpoint.OSFamily
  - Network.IP
  - User
  - Process.PID
  - Process.Name
  - Process.Path
  - Process.SHA256
  - Process.CommandLine
correlation_rules:
- subtype: passthrough
  fromversion: 6.10.0
  global_rule_id: SOC CrowdStrike Falcon - Endpoint All Alerts (non-CIE)
  name: SOC CrowdStrike Falcon - Endpoint All Alerts (non-CIE)
  description: Creates a single XSIAM alert for each CrowdStrike Falcon Endpoint Detection event. Consolidates 15 per-tactic rules from v1.0.14 into one rule using MITRE tactic as the User Defined alert category. Backwards compatible with alert field mappings from all 1.0.14 per-tactic rules.
  alert_name: SOC CrowdStrike Falcon - $alert_name
  alert_description: '''$alert_description | User: $actor_effective_username | Display Name: $display_name | Email: $idr_email | UPN: $idr_upn | Domain: $idr_domain_name | SAM: $idr_sam_account_name | SID: $idr_sid | On-Prem SID: $idr_on_prem_sid | NetBIOS: $idr_netbios'''
  alert_type: null
  crontab: null
  search_window: null
  simple_schedule: null
  timezone: null
  mitre_defs: {}
  investigation_query_link: 'dataset = xdr_data

    | filter agent_hostname = $hostname

    | fields *'
  schema_constants:
    rule_id: 0
    action: ALERTS
    alert_category: User Defined
    alert_domain: DOMAIN_SECURITY
    execution_mode: REAL_TIME
    is_enabled: true
    mapping_strategy: CUSTOM
    severity: User Defined
    drilldown_query_timeframe: ALERT
    user_defined_category: tactic
    user_defined_severity: severity_name
  suppression:
    enabled: true
    duration: 1 hours
    fields:
    - composite_id
  pre_alter: "| alter vendor_name = \"CrowdStrike\", product_name = \"Falcon\"\n\n| filter product = \"epp\"\n\n| alter originalrawlog = to_json_string(rawJSON)\n\n| alter severity_int_raw = severity\n\n| alter\n        tactic                 = if(tactic = \"Malware\", \"Execution\", tactic),\n        mitre_tactic           = if(tactic = \"Malware\", \"Execution\", tactic),\n        mitre_tactic_id        = tactic_id,\n        mitre_technique        = technique,\n        mitre_technique_id     = technique_id\n\n| alter mitre_ids_str = if(\n    technique_id != null and technique != null,\n    concat(technique_id, \" - \", technique),\n    coalesce(technique_id, technique)\n  )\n\n| alter\n        hostname                     = device->hostname,\n        domain                       = device->machine_domain,\n        local_ip                     = device->local_ip,\n        external_ip                  = device->external_ip,\n        mac_address                  = device->mac_address,\n        device_id                    = device->device_id,\n        device_ou                    = device->ou[],\n        parent_process_name          = parent_details->filename,\n        parent_process_cmd           = parent_details->cmdline,\n        parent_process_path          = parent_details->filepath,\n        parent_process_sha256        = parent_details->sha256,\n        parent_local_process_id      = parent_details->local_process_id,\n        grandparent_process_name     = grandparent_details->filename,\n        grandparent_process_cmd      = grandparent_details->cmdline,\n        grandparent_process_path     = grandparent_details->filepath,\n        grandparent_process_sha256   = grandparent_details->sha256,\n        grandparent_local_process_id = grandparent_details->local_process_id\n\n| alter device_ou_arr = arraymap(device_ou, replace(\"@element\", \"\\\"\", \"\"))\n\n| alter cgo_name = if(lowercase(grandparent_process_name) not in (\"wininit.exe\", \"userinit.exe\"),\n                      grandparent_process_name,\n                      coalesce(parent_process_name, filename)),\n        cgo_path = if(lowercase(grandparent_process_name) not in (\"wininit.exe\", \"userinit.exe\"),\n                      grandparent_process_path,\n                      coalesce(parent_process_path, filepath)),\n        cgo_cmd  = if(lowercase(grandparent_process_name) not in (\"wininit.exe\", \"userinit.exe\"),\n                      grandparent_process_cmd,\n                      coalesce(parent_process_cmd, cmdline))\n\n| alter dns_queries = dns_requests\n| alter remote_ips  = network_accesses\n\n| alter alert_name = concat(\n    \"[Endpoint] \",\n    coalesce(user_name, hostname, \"Unknown\"),\n    \" - \",\n    coalesce(tactic, \"Detection\"),\n    \": \",\n    coalesce(technique, name)\n  )\n\n| alter alert_description = concat(\n    coalesce(description, name),\n    \" | Host: \",  coalesce(hostname, \"Unknown\"),\n    \" | User: \",  coalesce(user_name, \"Unknown\"),\n    \" | Severity: \", coalesce(severity_name, \"Unknown\")\n  )\n\n| alter\n        vendor                              = vendor_name,\n        product                             = product_name,\n        originalalertid                     = composite_id,\n        originalalertname                   = alert_name,\n        originalalertsource                 = \"CrowdStrike Falcon\",\n        externallink                        = falcon_host_link,\n        alert_description                   = alert_description,\n        severity                            = severity_name,\n        mitretacticid                       = mitre_tactic_id,\n        mitretacticname                     = mitre_tactic,\n        mitretechniqueid                    = mitre_technique_id,\n        mitretechniquename                  = mitre_technique,\n        agent_hostname                      = hostname,\n        agent_id                            = agent_id,\n        agent_device_domain                 = domain,\n        actor_effective_username            = user_name,\n        actor_process_image_name            = filename,\n        actor_process_image_path            = filepath,\n        actor_process_image_sha256          = sha256,\n        actor_process_command_line          = cmdline,\n        actor_process_os_pid                = local_process_id,\n        causality_actor_process_image_name  = cgo_name,\n        causality_actor_process_image_path  = cgo_path,\n        causality_actor_process_image_sha256 = grandparent_process_sha256,\n        action_file_name                    = filename,\n        action_file_path                    = filepath,\n        action_file_sha256                  = sha256,\n        action_local_ip                     = local_ip,\n        action_remote_ip                    = remote_ips\n| fields\n    device_id, local_ip, user_name, user_principal, cmdline, sha256, domain, hostname, agent_id, pattern_disposition_description, pattern_disposition_details, cgo_cmd, cgo_name, cgo_path, template_instance_id, external_ip, falcon_host_link, mac_address, mitre_tactic_id, mitre_tactic, mitre_technique_id, mitre_technique, mitre_ids_str, tactic_id, tactic, technique_id, technique, objective, composite_id, parent_process_cmd, parent_process_name, parent_local_process_id, parent_process_path, parent_process_sha256, grandparent_process_name, grandparent_process_cmd, grandparent_process_path, grandparent_process_sha256, grandparent_local_process_id, device_ou_arr, process_start_time, local_process_id, md5, scenario, severity_name, aggregate_id, indicator_id, alert_name, alert_description, network_accesses, dns_requests, files_written, originalrawlog, *\n\n| alter ids_join_key = lowercase(coalesce(user_id, \"\"))\n\n| alter actor_effective_username = lowercase(coalesce(if(user_principal contains \"@\", user_principal, null), if(user_name contains \"@\", user_name, null), user_name))\n| alter idr_email = if(user_principal contains \"@\", lowercase(user_principal), if(user_name contains \"@\", lowercase(user_name), null)), idr_upn = user_principal, idr_sid = null, idr_netbios = null, idr_display_name = null\n| alter email = idr_email"
  alert_fields:
  - issue_field: mac
    source: mac_address
  - issue_field: domain
    source: agent_device_domain
  - issue_field: userid
    source: user_principal
  - issue_field: vendor
    source: vendor
  - issue_field: agentid
    source: agent_id
  - issue_field: localip
    source: action_local_ip
  - issue_field: product
