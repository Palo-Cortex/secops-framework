vendor: crowdstrike-falcon
product: Falcon
data_source: crowdstrike_falcon_event_raw
category: Endpoint
pack: soc-crowdstrike-falcon
raw_schema:
  product:
    type: string
    is_array: false
  severity:
    type: int
    is_array: false
  severity_name:
    type: string
    is_array: false
  incident_type:
    type: string
    is_array: false
  description:
    type: string
    is_array: false
  parent_process_id:
    type: string
    is_array: false
    status: declared_unused
  user_name:
    type: string
    is_array: false
  device:
    type: json
    is_array: false
    json_subfields:
    - hostname
    - machine_domain
    - os_version
    - local_ip
    - groups
    - mac_address
    - device_id
    - ou
    - external_ip
  parent_details:
    type: json
    is_array: false
    json_subfields:
    - filename
    - filepath
    - cmdline
    - sha256
    - local_process_id
  local_process_id:
    type: string
    is_array: false
    status: used_undeclared
  agent_id:
    type: string
    is_array: false
    status: inferred_from_correlation
  user_principal:
    type: string
    is_array: false
    status: inferred_from_correlation
  user_id:
    type: string
    is_array: false
    status: inferred_from_correlation
  cmdline:
    type: string
    is_array: false
    status: inferred_from_correlation
  filename:
    type: string
    is_array: false
    status: inferred_from_correlation
  filepath:
    type: string
    is_array: false
    status: inferred_from_correlation
  sha256:
    type: string
    is_array: false
    status: inferred_from_correlation
  md5:
    type: string
    is_array: false
    status: inferred_from_correlation
  process_start_time:
    type: string
    is_array: false
    status: inferred_from_correlation
  aggregate_id:
    type: string
    is_array: false
    status: inferred_from_correlation
  composite_id:
    type: string
    is_array: false
    status: inferred_from_correlation
  template_instance_id:
    type: string
    is_array: false
    status: inferred_from_correlation
  pattern_disposition_description:
    type: string
    is_array: false
    status: inferred_from_correlation
  pattern_disposition_details:
    type: json
    is_array: false
    status: inferred_from_correlation
  falcon_host_link:
    type: string
    is_array: false
    status: inferred_from_correlation
  confidence:
    type: int
    is_array: false
    status: inferred_from_correlation
  scenario:
    type: string
    is_array: false
    status: inferred_from_correlation
  objective:
    type: string
    is_array: false
    status: inferred_from_correlation
  ioc_value:
    type: string
    is_array: false
    status: inferred_from_correlation
  ioc_source:
    type: string
    is_array: false
    status: inferred_from_correlation
  dns_requests:
    type: json
    is_array: true
    status: inferred_from_correlation
  network_accesses:
    type: json
    is_array: true
    status: inferred_from_correlation
  files_written:
    type: json
    is_array: true
