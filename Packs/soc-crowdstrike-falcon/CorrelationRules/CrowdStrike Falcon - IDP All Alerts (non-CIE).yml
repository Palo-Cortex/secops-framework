rule_id: 0
fromversion: 6.10.0
action: ALERTS
alert_category: User Defined
alert_description: '$description | User: $actor_effective_username | Display Name: $display_name | Email: $idr_email | UPN: $idr_upn | Domain: $idr_domain_name | SAM: $idr_sam_account_name | SID: $idr_sid | On-Prem SID: $idr_on_prem_sid | NetBIOS: $idr_netbios'
alert_domain: DOMAIN_SECURITY
alert_fields:
  mac: mac_address
  domain: agent_device_domain
  userid: user_principal
  vendor: vendor
  localip: action_local_ip
  product: product
  rawjson: rawjson
  usersid: idr_sid
  agent_id: agent_id
