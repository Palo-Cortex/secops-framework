fromversion: 6.10.0
id: SOC_CrowdStrikeFalcon_ModelingRule
name: SOC CrowdStrike Falcon Modeling Rule
rules: "// SOC CrowdStrike Falcon Modeling Rules\n// Dataset: crowdstrike_falcon_event_raw\n// Version: 1.2\n//\n// Changes from v1.1:\n//   FIXED:  fromversion corrected to 6.10.0 (was incorrectly set to 8.3.1 — caused 101704 upload rejection)\n//   FIXED:  local_process_id declared in schema.json (was used in XIF but missing from schema)\n//   ADDED:  xdm.event.id              = composite_id        (confirmed valid per XDM docs example)\n//   ADDED:  xdm.source.host.device_id = device->device_id  (confirmed valid per XDM field structure docs)\n//   ADDED:  xdm.source.agent.identifier     = agent_id      (deferred — verify with XQL probe before deploy)\n//   ADDED:  xdm.observer.unique_identifier  = agent_id      (deferred — verify with XQL probe before deploy)\n//   DEFERRED: xdm.target.ipv4/port via arrayindex — needs XQL probe to confirm arrayindex works in XIF context\n//\n// Changes from v1.0 (shipped in 1.0.14):\n//   xdm.event.original_event_type = scenario (was incident_type)\n//   scenario is the CrowdStrike classification string (known_malware, credential_theft, etc.)\n//\n// XDM fields requested but NOT available in crowdstrike_falcon_event_raw EPP events:\n//   xdm.target.ipv6, xdm.source.ipv6     — no IPv6 in CrowdStrike EPP device object\n//   xdm.source.port                       — local port not emitted in EPP detections\n//   xdm.source.asn.*                      — requires network telemetry\n//   xdm.source.location.*                 — requires external geo enrichment\n//   xdm.intermediate.is_nat/is_proxy      — network flow concept; not in EPP events\n//   xdm.event.is_completed/duration       — not emitted by EPP\n//   xdm.target/source.sent_bytes/packets  — flow data; not in EPP detections\n//   xdm.source.user_agent                 — HTTP context; not in EPP events\n//   xdm.source.process.container_id       — not in EPP detections\n//   xdm.source.host.device_category/model/manufacturer — not in CS device object\n//   xdm.target.*                          — EPP events are source-centric; no target host/agent\n//   xdm.source.interface                  — not in EPP events\n\n[MODEL:dataset=\"crowdstrike_falcon_event_raw\"]\nfilter product = \"epp\"\n| alter\n    // ── Alert / Event Identity ────────────────────────────────────────────\n    xdm.alert.severity              = concat(to_string(severity), \" - \", severity_name),\n    xdm.event.id                    = composite_id,\n    xdm.event.original_event_type   = scenario,\n    xdm.event.description           = description,\n    xdm.event.type                  = incident_type,\n\n    // ── Source Host ───────────────────────────────────────────────────────\n    xdm.source.host.hostname        = device -> hostname,\n    xdm.source.host.fqdn            = device -> machine_domain,\n    xdm.source.host.os_family       = device -> os_version,\n    xdm.source.host.device_id       = device -> device_id,\n    xdm.source.ipv4                 = device -> local_ip,\n\n    // ── Source Agent ─────────────────────────────────────────────────────\n    xdm.source.agent.identifier     = agent_id,\n\n    // ── Source User ───────────────────────────────────────────────────────\n    xdm.source.user.username        = user_name,\n    xdm.source.user.domain          = device -> machine_domain,\n    xdm.source.user.groups          = device -> groups[],\n\n    // ── Source Process ────────────────────────────────────────────────────\n    xdm.source.process.pid          = to_integer(local_process_id),\n    xdm.source.process.name         = parent_details -> filename,\n    xdm.source.process.command_line = parent_details -> cmdline,\n    xdm.source.process.executable.path   = parent_details -> filepath,\n    xdm.source.process.executable.sha256 = parent_details -> sha256;\n\n// ═══════════════════════════════════════════════════════════════════════════\n// DEFERRED — verify with XQL probe before promoting to alter block\n//\n// xdm.observer.unique_identifier = agent_id\n//   dataset = crowdstrike_falcon_event_raw | filter product = \"epp\"\n//   | alter xdm.observer.unique_identifier = agent_id | fields xdm.observer.unique_identifier | limit 5\n//\n// xdm.target.ipv4 = arrayindex(network_accesses,0)->remote_address\n//   dataset = crowdstrike_falcon_event_raw | filter product = \"epp\"\n//   | alter t = arrayindex(network_accesses,0)->remote_address | fields t | limit 5\n//   Note: if arrayindex fails in XIF context, try: network_accesses[0]->remote_address\n//\n// xdm.target.port = to_integer(arrayindex(network_accesses,0)->remote_port)\n//   Only run after target.ipv4 probe succeeds.\n// ═══════════════════════════════════════════════════════════════════════════\n"
schema: "{\n  \"crowdstrike_falcon_event_raw\": {\n    \"product\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"severity\": {\n      \"type\": \"int\",\n      \"is_array\": false\n    },\n    \"severity_name\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"incident_type\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"description\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"local_process_id\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"parent_process_id\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"composite_id\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"agent_id\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"device\": {\n      \"type\": \"json\",\n      \"is_array\": false\n    },\n    \"user_name\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"parent_details\": {\n      \"type\": \"json\",\n      \"is_array\": false\n    },\n    \"scenario\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"user_principal\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"pattern_disposition_details\": {\n      \"type\": \"json\",\n      \"is_array\": false\n    },\n    \"network_accesses\": {\n      \"type\": \"json\",\n      \"is_array\": true\n    },\n    \"dns_requests\": {\n      \"type\": \"json\",\n      \"is_array\": true\n    },\n    \"files_written\": {\n      \"type\": \"json\",\n      \"is_array\": true\n    }\n  }\n}\n"
