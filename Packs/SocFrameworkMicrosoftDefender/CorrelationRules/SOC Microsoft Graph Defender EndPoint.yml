rule_id: 0
fromversion: 6.10.0
tags:
  - SOCFramework
  - Passthrough
  - Endpoint
  - MicrosoftDefenderForEndpoint
action: ALERTS
alert_category: User Defined
alert_description: $description
alert_domain: DOMAIN_SECURITY
alert_fields:
  vendor: vendor
  product: product
  originalalertid: originalalertid
  originalalertname: originalalertname
  originalalertsource: originalalertsource
  externallink: externallink
  alert_description: alert_description
  severity: severity
  mitretacticid: mitretacticid
  mitretacticname: mitretacticname
  mitretechniqueid: mitretechniqueid
  mitretechniquename: mitretechniquename
  agent_hostname: agent_hostname
  agent_id: agent_id
  agent_device_domain: agent_device_domain
  actor_effective_username: actor_effective_username
  actor_process_image_name: actor_process_image_name
  actor_process_image_path: actor_process_image_path
  actor_process_image_sha256: actor_process_image_sha256
  actor_process_command_line: actor_process_command_line
  actor_process_os_pid: actor_process_os_pid
  causality_actor_process_image_name: causality_actor_process_image_name
  causality_actor_process_image_path: causality_actor_process_image_path
  causality_actor_process_image_sha256: causality_actor_process_image_sha256
  action_file_name: action_file_name
  action_file_path: action_file_path
  action_file_sha256: action_file_sha256
  action_local_ip: action_local_ip
  action_remote_ip: action_remote_ip
  usersid: evidence_user_userSid
  actor_process_signature_vendor: evidence_process_signer
  processid: evidence_process_pid
  processcreationtime: evidence_process_starttime
  causality_actor_process_signature_vendor: evidence_parent_process_signer
  parentprocessid: evidence_parent_process_pid
  parentprocessname: evidence_parent_process_name
  parentprocesspath: evidence_parent_process_path
  parentprocesssha256: evidence_parent_process_sha256
  deviceexternalips: evidence_device_externalip
  deviceosname: evidence_device_os
  action_remote_ip_v6: evidence_remote_ipv6
  user_principal: user_principal
  causality_actor_causality_id: causality_synth
  xdmsourceprocesscausalityid: causality_synth
  samaccountname: evidence_loggedon_user
  userid: evidence_user_upn
  alertaction: evidence_process_action
  detectionid: detectorId
  alert_name: alert_name
  agentid: agent_id
  hostname: agent_hostname
  domain: agent_device_domain
  username: actor_effective_username
  initiatedby: actor_process_image_name
  initiatorpath: actor_process_image_path
  initiatorsha256: actor_process_image_sha256
  initiatorcmd: actor_process_command_line
  initiatorpid: actor_process_os_pid
  cgosha256: causality_actor_process_image_sha256
  filename: action_file_name
  filepath: action_file_path
  filesha256: action_file_sha256
  localip: action_local_ip
  remoteip: action_remote_ip
alert_name: $alert_name
alert_type: null
crontab: '*/10 * * * *'
dataset: alerts
name: SOC Microsoft Graph Defender EndPoint
description: >-
  Creates an XSIAM alert for each Microsoft Graph Endpoint Detection Event.
drilldown_query_timeframe: ALERT
execution_mode: SCHEDULED
global_rule_id: SOC Microsoft Graph Defender EndPoint
investigation_query_link: |-
  dataset = xdr_data
  | filter agent_hostname = $evidence_device_hostname
  | fields *
is_enabled: true
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs: {}
search_window: 20 minutes
severity: User Defined
simple_schedule: 10 minutes
suppression_duration: 1 hours
suppression_enabled: true
suppression_fields:
- providerAlertId
timezone: null
user_defined_category: tactic
user_defined_severity: severity
xql_query: |
  dataset = msft_graph_security_alerts_raw
  | alter vendor_name = "Microsoft", product_name = productName

  | filter productName in ("Microsoft Defender for Endpoint", "Microsoft Defender XDR")

  | filter status != "resolved"

  | alter tactic = category

  | alter
      cat_norm  = replace(replace(replace(replace(lowercase(category), " ", ""), "-", ""), "_", ""), ".", ""),
      mitre_str = lowercase(coalesce(mitreTechniques, ""))

  | alter
      mitre_tactic       = category,
      mitre_tactic_id    = if(
          cat_norm contains "initialaccess",       "TA0001",
          cat_norm contains "execution",           "TA0002",
          cat_norm contains "persistence",         "TA0003",
          cat_norm contains "privilegeescalation", "TA0004",
          cat_norm contains "defenseevasion",      "TA0005",
          cat_norm contains "credentialaccess",    "TA0006",
          cat_norm contains "discovery",           "TA0007",
          cat_norm contains "lateralmovement",     "TA0008",
          cat_norm contains "collection",          "TA0009",
          cat_norm contains "commandandcontrol",   "TA0011",
          cat_norm contains "exfiltration",        "TA0010",
          cat_norm contains "impact",              "TA0040",
          ""),
      mitre_technique       = mitreTechniques,
      mitre_technique_id    = mitreTechniques,
      mitre_technique_first = arrayindex(mitreTechniques -> [], 0),
      mitre_technique_str   = arraystring(mitreTechniques -> [], ", ")

  | alter
      processEvidence = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "processEvidence"), 0),
      fileEvidence    = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "fileEvidence"), 0),
      deviceEvidence  = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "deviceEvidence"), 0),
      userEvidence    = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "userEvidence"), 0),
      ipEvidence      = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "ipEvidence"), 0)

  | alter
      evidence_process_name          = processEvidence -> imageFile.fileName,
      evidence_process_path          = processEvidence -> imageFile.filePath,
      evidence_process_command_line  = processEvidence -> processCommandLine,
      evidence_process_signer        = processEvidence -> imageFile.filePublisher,
      evidence_process_sha256        = processEvidence -> imageFile.sha256,
      evidence_process_pid           = processEvidence -> processId,
      evidence_process_starttime     = processEvidence -> processCreationDateTime,
      evidence_process_action        = processEvidence -> detectionStatus,
      evidence_parent_process_signer = processEvidence -> parentProcessImageFile.filePublisher,
      evidence_parent_process_name   = coalesce(processEvidence -> parentProcessImageFile.fileName, null),
      evidence_parent_process_path   = coalesce(processEvidence -> parentProcessImageFile.filePath, null),
      evidence_parent_process_sha256 = coalesce(processEvidence -> parentProcessImageFile.sha256, null),
      evidence_parent_process_pid    = processEvidence -> parentProcessId

  | alter
      evidence_file_name   = fileEvidence -> fileDetails.fileName,
      evidence_file_sha256 = fileEvidence -> fileDetails.sha256

  | alter
      evidence_device_hostname   = deviceEvidence -> hostName,
      evidence_device_ntdomain   = deviceEvidence -> ntDomain,
      evidence_device_os         = deviceEvidence -> osPlatform,
      evidence_device_agentid    = deviceEvidence -> mdeDeviceId,
      evidence_device_externalip = deviceEvidence -> lastExternalIpAddress,
      evidence_local_ipv4        = deviceEvidence -> lastIpAddress,
      evidence_device_dnsdomain  = deviceEvidence -> deviceDnsName

  | alter
      mailboxEvidence = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "mailboxEvidence"), 0)
  | alter
      evidence_mailbox_address = mailboxEvidence -> primaryAddress

  | alter
      evidence_user_upn      = userEvidence -> userAccount.userPrincipalName,
      evidence_user_domain   = userEvidence -> userAccount.domainName,
      evidence_user_userSid  = userEvidence -> userAccount.userSid,
      evidence_loggedon_user = userEvidence -> userAccount.accountName

  | alter
      evidence_remote_ipv4 = if(ipEvidence -> ipAddress ~= "(?:\\d{1,3}\\.){3}\\d{1,3}",
                                ipEvidence -> ipAddress, null),
      evidence_remote_ipv6 = if(ipEvidence -> ipAddress ~= "^[0-9a-f:]+$",
                                ipEvidence -> ipAddress, null)

  | alter
      source_user           = lowercase(coalesce(evidence_user_upn, evidence_mailbox_address, evidence_loggedon_user)),
      user_principal        = evidence_user_upn,
      causality_synth       = if(incidentId != null, concat("msgraph-incident-", to_string(incidentId)), null),
      cid                   = incidentId,
      initiator_sha256      = evidence_process_sha256,
      cgo_sha256            = evidence_parent_process_sha256,
      target_process_sha256 = evidence_process_sha256,
      file_sha256           = evidence_file_sha256,
      remote_ip             = evidence_remote_ipv4

  | alter user_name    = source_user
  | alter display_name = null

  | alter
      description = coalesce(description,
                             concat("Microsoft Defender for Endpoint alert: ", title)),
      alert_name  = concat(
          "[Endpoint] ",
          coalesce(evidence_device_hostname, "Unknown Host"),
          " | ",
          coalesce(category, "Detection"),
          " | ",
          coalesce(arrayindex(mitreTechniques -> [], 0), arraystring(mitreTechniques -> [], ","), title)
      )

  | alter
          vendor                              = vendor_name,
          product                             = product_name,
          originalalertid                     = providerAlertId,
          originalalertname                   = alert_name,
          originalalertsource                 = productName,
          externallink                        = alertWebUrl,
          alert_description                   = description,
          severity                            = severity,
          mitretacticid                       = mitre_tactic_id,
          mitretacticname                     = mitre_tactic,
          mitretechniqueid                    = mitre_technique_first,
          mitretechniquename                  = mitre_technique_str,
          agent_hostname                      = evidence_device_hostname,
          agent_id                            = evidence_device_agentid,
          agent_device_domain                 = evidence_device_ntdomain,
          actor_effective_username            = source_user,
          actor_process_image_name            = evidence_process_name,
          actor_process_image_path            = evidence_process_path,
          actor_process_image_sha256          = evidence_process_sha256,
          actor_process_command_line          = evidence_process_command_line,
          actor_process_os_pid                = evidence_process_pid,
          causality_actor_process_image_name  = evidence_parent_process_name,
          causality_actor_process_image_path  = evidence_parent_process_path,
          causality_actor_process_image_sha256 = evidence_parent_process_sha256,
          action_file_name                    = evidence_file_name,
          action_file_path                    = null,
          action_file_sha256                  = evidence_file_sha256,
          action_local_ip                     = evidence_local_ipv4,
          action_remote_ip                    = evidence_remote_ipv4

  | alter idr_sid = null,
          idr_upn = user_principal,
          idr_email = if(user_principal contains "@", lowercase(user_principal), if(user_name contains "@", lowercase(user_name), null)),
          idr_netbios = null,
          idr_display_name = null,
          idr_domain_name = null,
          idr_sam_account_name = null,
          idr_on_prem_sid = null

  // ============== CIE ENRICHMENT (optional, OFF by default) ==============
  // Cloud Identity Engine enrichment is disabled. To enable it:
  //   1. Set this rule to a schedule (it ships REAL_TIME):
  //        execution mode = SCHEDULED
  //        crontab        = */10 * * * *
  //        search window  = 20 minutes
  //        schedule label = 10 minutes
  //   2. Delete the /* and */ lines that wrap the block below.
  // The join coalesces socfw_identity_map values OVER the inline idr_* fields;
  // the alert-field mappings do not change. Requires SOC IdentityResolve.
  // ----------------------------------------------------------------------
  /*
  | filter timestamp_diff(time_frame_end(), _insert_time, "MINUTE") <= 15
  | alter cie_join_key = lowercase(coalesce(evidence_user_userSid, ""))
  | join type = left (
      dataset = socfw_identity_map
      | filter type in ("user")
      | alter cie_join_key = lowercase(coalesce(sid, on_prem_sid))
      | dedup cie_join_key by asc netbios_and_sam_account_name
      | fields cie_join_key,
               sid                          as map_sid,
               upn                          as map_upn,
               email                        as map_email,
               display_name                 as map_display,
               domain_name                  as map_domain,
               sam_account_name             as map_sam,
               on_prem_sid                  as map_on_prem_sid,
               netbios_and_sam_account_name as map_netbios
    ) as m cie_join_key = m.cie_join_key
  | alter idr_sid              = coalesce(map_sid, idr_sid),
          idr_upn              = coalesce(map_upn, idr_upn),
          idr_email            = coalesce(map_email, idr_email),
          idr_display_name     = coalesce(map_display, idr_display_name),
          idr_domain_name      = coalesce(map_domain, idr_domain_name),
          idr_sam_account_name = coalesce(map_sam, idr_sam_account_name),
          idr_on_prem_sid      = coalesce(map_on_prem_sid, idr_on_prem_sid),
          idr_netbios          = coalesce(map_netbios, idr_netbios)
  | alter _time = _insert_time
  */
  // ===================== END CIE ENRICHMENT =============================
  | alter original_display_name   = display_name,
          original_user_principal = user_principal

  | alter display_name   = coalesce(idr_display_name, idr_sam_account_name, display_name),
          email          = idr_email,
          user_principal = coalesce(idr_upn, user_principal)
  | alter actor_effective_username = lowercase(coalesce(idr_email, idr_upn, idr_netbios, actor_effective_username))

  | alter idr_email = coalesce(idr_email, idr_upn, if(user_principal contains "@", lowercase(user_principal), null), if(user_name contains "@", lowercase(user_name), null))
  | alter email     = idr_email

  | alter original_user_name = user_name
  | alter user_name = if(user_name contains "$", user_name, coalesce(idr_email, idr_upn, user_name))
  | fields
      _time, incidentId, productName, vendor_name, product_name, title, description, severity, tactic, alert_name, category, alertWebUrl, providerAlertId, detectorId, mitreTechniques, mitre_str, cat_norm, mitre_tactic, mitre_tactic_id, mitre_technique, mitre_technique_id, cid, initiator_sha256, cgo_sha256, target_process_sha256, file_sha256, remote_ip, source_user, user_principal, causality_synth, evidence_mailbox_address, evidence_user_upn, evidence_user_userSid, evidence_process_name, evidence_process_path, evidence_process_command_line, evidence_process_signer, evidence_process_sha256, evidence_process_pid, evidence_parent_process_name, evidence_parent_process_path, evidence_parent_process_sha256, evidence_parent_process_pid, evidence_file_name, evidence_file_sha256, evidence_device_hostname, evidence_device_ntdomain, evidence_device_os, evidence_device_agentid, evidence_local_ipv4, evidence_remote_ipv4, evidence_remote_ipv6, evidence_device_externalip, evidence_parent_process_signer, evidence_process_starttime, evidence_process_action, *
