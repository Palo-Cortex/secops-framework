fromversion: 6.10.0
id: Microsoft_Graph_MDE_ModelingRule
name: Microsoft Graph Defender EP Modeling Rule
rules: "[MODEL:dataset=\"msft_graph_security_alerts_raw\"]\nfilter serviceSource = \"microsoftDefenderForEndpoint\"\n| alter\n    xdm.event.id                  = id,\n    xdm.event.description         = coalesce(description, title),\n    xdm.event.original_event_type = category,\n    xdm.alert.name                = title,\n    xdm.alert.category            = category,\n    xdm.alert.original_alert_id   = providerAlertId,\n    xdm.alert.severity            = severity,\n    xdm.observer.product          = productName,\n    xdm.observer.vendor           = \"Microsoft\",\n    xdm.network.http.url          = alertWebUrl;\n"
schema: "{\n  \"msft_graph_security_alerts_raw\": {\n    \"id\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"title\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"description\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"category\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"severity\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"status\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"serviceSource\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"productName\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"providerAlertId\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"alertWebUrl\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"incidentId\": {\n      \"type\": \"string\",\n      \"is_array\": false\n    },\n    \"mitreTechniques\": {\n      \"type\": \"json\",\n      \"is_array\": true\n    },\n    \"evidence\": {\n      \"type\": \"json\",\n      \"is_array\": true\n    }\n  }\n}\n"
