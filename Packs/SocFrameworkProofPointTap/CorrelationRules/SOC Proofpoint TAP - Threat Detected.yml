rule_id: 0
fromversion: 6.10.0
action: ALERTS
alert_category: User Defined
alert_description: $alert_description
alert_domain: DOMAIN_SECURITY
alert_fields:
  # -- Core identity / actor --------------------------------------------------
  actor_effective_username: recipient          # user who received the email
  agent_device_domain: domain                  # registered domain from threat URL

  # -- File indicators --------------------------------------------------------
  action_file_sha256: proofpointsha256          # attachment SHA256 (WildFire grouping)
  action_file_md5: proofpointmd5                # attachment MD5
  action_file_name: proofpointfilename          # attachment filename

  # -- Network indicators -----------------------------------------------------
  action_remote_ip: senderIP                   # sender IP (grouping + analytics)
  dns_query_name: dns_name                     # threat domain (DNS grouping)
  fw_url_domain: domain                        # URL domain

  # -- Email-specific fields --------------------------------------------------
  emailmessageid: messageID
  emailsenderip: senderIP
  emailsource: sender
  fw_email_recipient: recipient
  fw_email_sender: sender
  fw_email_subject: subject

  # -- SOC Framework generic email fields ---------------------------------------------------------
  # Replaces proofpointtap* fields. Read by Foundation_-_Normalize_Email_V3.
  socfwemaildeliveryaction: delivery_action
  socfwemaildirection: direction
  socfwemailthreaturl: threat_urls
  socfwemailthreattype: threat_types
  socfwemailthreatstatus: threat_statuses
  socfwemailthreatid: threat_ids
  socfwemailclassification: classification_all
  socfwemailphishscore: phishScore
  socfwemailmalwarescore: malwareScore
  socfwemailcampaignid: campaignId
  socfwemailclickip: clickIP
  socfwemailclicktime: clickTime
alert_name: $alert_name
alert_type:
crontab:
dataset: alerts
description: Unified Proofpoint TAP alert rule covering messages delivered and clicks permitted. Fires on active or malicious threat status only. Suppression is per GUID to preserve full blast-radius visibility for lateral risk detection.
drilldown_query_timeframe: ALERT
execution_mode: REAL_TIME
global_rule_id: SOC Proofpoint TAP - Threat Detected
investigation_query_link: ''
is_enabled: true
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs:
  TA0001 - Initial Access:
  - T1566 - Phishing
  TA0009 - Collection:
  - T1114 - Email Collection
name: SOC Proofpoint TAP - Threat Detected
search_window:
severity: User Defined
simple_schedule:
suppression_duration: 24 hours
suppression_enabled: true
suppression_fields:
- GUID
timezone:
user_defined_category: alert_category
user_defined_severity: alert_severity
xql_query: |
  dataset = proofpoint_tap_v2_generic_alert_raw
  // Step 1: type gate
  | filter type in ("messages delivered", "clicks permitted")
  | alter threatsInfoMap_str = threatsInfoMap
  | alter first_threat_status = json_extract_scalar(threatsInfoMap_str, "$[0].threatStatus")
  | filter (
      first_threat_status in ("active", "malicious")
      or threatStatus in ("active", "malicious")
  )

  // Step 5: alert name and type derivation
  | alter
      alert_severity    = coalesce(_alert_data -> severity, "SEV_030_MEDIUM"),
      alert_category    = coalesce(_alert_data -> alert_category, "Email Security"),
      alert_description = coalesce(_alert_data -> alert_description, concat("Proofpoint TAP threat detected: ", type, " -- GUID: ", GUID)),
      alert_name = if(
          type = "clicks permitted",
          concat("[Email] ", coalesce(to_string(recipient), "Unknown"), " - Initial Access: Malicious Link Clicked"),
          concat("[Email] ", coalesce(to_string(recipient), "Unknown"), " - Initial Access: Threat Email Delivered")
      ),
      alert_type = if(
          type = "clicks permitted",
          "Proofpoint TAP - Click Permitted",
          "Proofpoint TAP - Message Delivered"
      )

  // Step 5b: derive delivery_action for socfwemaildeliveryaction
  | alter delivery_action = if(
      type = "messages delivered", "delivered",
      type = "clicks permitted",   "click_permitted",
      type = "messages blocked",   "blocked",
      type = "clicks blocked",     "click_blocked",
      type
  )

  // Step 5c: direction always inbound for TAP
  | alter direction = "inbound"

  // Step 6: severity and category from _alert_data
  //   _alert_data -> severity returns XSIAM internal codes (e.g. SEV_030_MEDIUM).
  //   Coalesce to "medium" as safe default if field is absent or null.
  | alter
      threat_ids         = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatID")), ", "),
      classification_all = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.classification")), ", "),
      threat_types       = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatType")), ", "),
      threat_statuses    = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatStatus")), ", "),
      threat_urls        = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), coalesce(json_extract_scalar("@element", "$.threatUrl"), json_extract_scalar("@element", "$.threatURL"))), ", "),
      threat_indicators  = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threat")), ", ")
  | alter
      proofpointsha256   = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.sha256")), ", "),
      proofpointmd5      = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.md5")), ", "),
      proofpointfilename = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.filename")), ", ")
  | alter
      domain   = if(threat_types ~= "url", coalesce(extract_url_registered_domain(threat_indicators), extract_url_registered_domain(sender)), ""),
      dns_name = if(threat_types ~= "url", extract_url_registered_domain(threat_indicators), "")
