crontab: '*/10 * * * *'
dataset: alerts
name: SOC Proofpoint TAP - Threat Detected All Alerts
description: >-
  Unified Proofpoint TAP alert rule covering messages delivered and clicks
  permitted. Fires on active or malicious threat status only. Suppression is per
  GUID to preserve full blast-radius visibility for lateral risk detection.
  Replaces 1.0.4 two-rule/two-instance split. Volume controlled by threat status
  filter. Supports both V3 SOC Framework playbooks (via socfw* fields) and
  legacy soc-phishing-investigation-1.0.5 playbooks and layouts (via
  proofpointtap* fields). Legacy fields marked for removal when old phishing
  pack is decommissioned. Cross-rule grouping pivots (with CrowdStrike Falcon
  and other endpoint sources): actor_effective_username (lowercase full
  principal -- UPN when the vendor has it), user_principal (raw-case UPN,
  parallel pivot), action_local_ip (clickIP → endpoint local_ip), and
  action_file_sha256 (attachment hash). Username normalization: lowercase,
  DOMAIN\-prefix-stripped, full principal. UPN when the vendor delivers one;
  bare SAM only when it genuinely doesn't. Lowercase is mandatory --
  exact-equality grouping makes casing a silent pivot-killer.
drilldown_query_timeframe: ALERT
execution_mode: SCHEDULED
global_rule_id: SOC Proofpoint TAP - Threat Detected All Alerts
investigation_query_link: |-
  dataset = proofpoint_tap_v2_generic_alert_raw
  | filter GUID = "$originalalertid"
  | fields *
is_enabled: true
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs:
  TA0001 - Initial Access:
  - T1566 - Phishing
  TA0009 - Collection:
  - T1114 - Email Collection
search_window: 20 minutes
severity: User Defined
simple_schedule: 10 minutes
suppression_duration: 24 hours
suppression_enabled: true
suppression_fields:
- GUID
- type
timezone: null
user_defined_category: alert_category
user_defined_severity: alert_severity
xql_query: |
  dataset = proofpoint_tap_v2_generic_alert_raw
  | alter vendor_name = "Proofpoint", product_name = "TAP"

  | filter type in ("messages delivered", "clicks permitted")

  | alter threatsInfoMap_str = threatsInfoMap
  | alter first_threat_status = json_extract_scalar(threatsInfoMap_str, "$[0].threatStatus")
  | filter (
      first_threat_status in ("active", "malicious")
      or threatStatus in ("active", "malicious")
  )

  | alter recipient_upn = arrayindex(regextract(to_string(recipient), "([\w.%+-]+@[\w.-]+)"), 0)

  | alter
      alert_severity    = if(_alert_data -> severity != null and _alert_data -> severity != "",
                             _alert_data -> severity,
                             "SEV_030_MEDIUM"),
      alert_category    = if(_alert_data -> alert_category != null and _alert_data -> alert_category != "",
                             _alert_data -> alert_category,
                             "Email Security"),
      alert_name = if(
          type = "clicks permitted",
          concat("[Email] ", coalesce(recipient_upn, "Unknown"), " - Initial Access: Malicious Link Clicked"),
          concat("[Email] ", coalesce(recipient_upn, "Unknown"), " - Initial Access: Threat Email Delivered")
      ),
      alert_type = if(
          type = "clicks permitted",
          "Proofpoint TAP - Click Permitted",
          "Proofpoint TAP - Message Delivered"
      )

  | alter delivery_action = if(
      type = "messages delivered", "delivered",
      type = "clicks permitted",   "click_permitted",
      type = "messages blocked",   "blocked",
      type = "clicks blocked",     "click_blocked",
      type
  )
  | alter direction = "inbound"

  | alter
      threat_ids         = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatID")), ", "),
      classification_all = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.classification")), ", "),
      threat_types       = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatType")), ", "),
      threat_statuses    = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatStatus")), ", "),
      threat_urls        = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), coalesce(json_extract_scalar("@element", "$.threatUrl"), json_extract_scalar("@element", "$.threatURL"))), ", "),
      threat_indicators  = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threat")), ", ")

  | alter
      proofpointsha256   = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.sha256")), ", "),
      proofpointmd5      = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.md5")), ", "),
      proofpointfilename = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.filename")), ", ")

  | alter
      domain   = if(threat_types ~= "url", coalesce(extract_url_registered_domain(threat_indicators), extract_url_registered_domain(sender)), ""),
      dns_name = if(threat_types ~= "url", extract_url_registered_domain(threat_indicators), "")

  | alter cleaned_url = ltrim(replex(coalesce(threat_indicators, url), "^https?://", ""), "www.")

  | alter linkedCount = to_integer(_alert_data -> linkedCount)

  | alter
      bc_threatid       = json_extract_scalar(threatsInfoMap_str, "$[0].threatID"),
      bc_classification = json_extract_scalar(threatsInfoMap_str, "$[0].classification"),
      bc_threaturl      = coalesce(
          json_extract_scalar(threatsInfoMap_str, "$[0].threatUrl"),
          json_extract_scalar(threatsInfoMap_str, "$[0].threatURL")
      ),
      bc_threatinfomap  = json_extract(threatsInfoMap_str, "$[0]")

  | alter description = concat("Proofpoint TAP threat detected: ", type, " | Recipient: ", coalesce(recipient_upn, "Unknown"), " -- GUID: ", GUID)

  | alter
          vendor                              = vendor_name,
          product                             = product_name,
          originalalertid                     = GUID,
          originalalertname                   = alert_name,
          originalalertsource                 = "Proofpoint TAP",
          externallink                        = null,
          alert_description                   = description,
          severity                            = alert_severity,
          mitretacticid                       = "TA0001",
          mitretacticname                     = "Initial Access",
          mitretechniqueid                    = "T1566",
          mitretechniquename                  = "Phishing",
          agent_hostname                      = null,
          agent_id                            = null,
          agent_device_domain                 = null,
          actor_effective_username            = lowercase(recipient_upn),
          actor_process_image_name            = null,
          actor_process_image_path            = null,
          actor_process_image_sha256          = null,
          actor_process_command_line          = null,
          actor_process_os_pid                = null,
          causality_actor_process_image_name  = null,
          causality_actor_process_image_path  = null,
          causality_actor_process_image_sha256 = null,
          action_file_name                    = proofpointfilename,
          action_file_path                    = null,
          action_file_sha256                  = proofpointsha256,
          action_local_ip                     = clickIP,
          action_remote_ip                    = null

  | alter
          user_principal                      = recipient_upn

  | alter user_name    = recipient_upn
  | alter display_name = null

  | alter idr_sid = null,
          idr_upn = user_principal,
          idr_email = if(user_principal contains "@", lowercase(user_principal), if(user_name contains "@", lowercase(user_name), null)),
          idr_netbios = null,
          idr_display_name = null,
          idr_domain_name = null,
          idr_sam_account_name = null,
          idr_on_prem_sid = null

  // ============== CIE ENRICHMENT (optional, OFF by default) ==============
  // Cloud Identity Engine enrichment is disabled. To enable it:
  //   1. Set this rule to a schedule (it ships REAL_TIME):
  //        execution mode = SCHEDULED
  //        crontab        = */10 * * * *
  //        search window  = 25 hours
  //        schedule label = 10 minutes
  //   2. Delete the /* and */ lines that wrap the block below.
  // The join coalesces socfw_identity_map values OVER the inline idr_* fields;
  // the alert-field mappings do not change. Requires SOC IdentityResolve.
  // ----------------------------------------------------------------------
  /*
  | filter timestamp_diff(time_frame_end(), _insert_time, "MINUTE") <= 15
  | alter cie_join_key = lowercase(coalesce(if(user_principal contains "@", user_principal, null), if(user_name contains "@", user_name, null)))
  | join type = left (
      dataset = socfw_identity_map
      | filter type = "user"
      | alter cie_join_key = lowercase(coalesce(upn, email))
      | dedup cie_join_key by asc netbios_and_sam_account_name
      | fields cie_join_key,
               sid                          as map_sid,
               upn                          as map_upn,
               email                        as map_email,
               display_name                 as map_display,
               domain_name                  as map_domain,
               sam_account_name             as map_sam,
               on_prem_sid                  as map_on_prem_sid,
               netbios_and_sam_account_name as map_netbios
    ) as m cie_join_key = m.cie_join_key
  | alter idr_sid              = coalesce(map_sid, idr_sid),
          idr_upn              = coalesce(map_upn, idr_upn),
          idr_email            = coalesce(map_email, idr_email),
          idr_display_name     = coalesce(map_display, idr_display_name),
          idr_domain_name      = coalesce(map_domain, idr_domain_name),
          idr_sam_account_name = coalesce(map_sam, idr_sam_account_name),
          idr_on_prem_sid      = coalesce(map_on_prem_sid, idr_on_prem_sid),
          idr_netbios          = coalesce(map_netbios, idr_netbios)
  | alter _time = _insert_time
  */
  // ===================== END CIE ENRICHMENT =============================
  | alter original_display_name   = display_name,
          original_user_principal = user_principal

  | alter display_name   = coalesce(idr_display_name, idr_sam_account_name, display_name),
          email          = idr_email,
          user_principal = coalesce(idr_upn, user_principal)
  | alter actor_effective_username = lowercase(coalesce(idr_email, idr_upn, idr_netbios, actor_effective_username))

  | alter idr_email = coalesce(idr_email, idr_upn, if(user_principal contains "@", lowercase(user_principal), null), if(user_name contains "@", lowercase(user_name), null))
  | alter email     = idr_email

  | alter original_user_name = user_name
  | alter user_name = if(user_name contains "$", user_name, coalesce(idr_email, idr_upn, user_name))
