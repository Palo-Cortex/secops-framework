          cie_upn         = coalesce(ids_upn, idu_upn, idsam_upn),
          cie_email       = coalesce(ids_email, idu_email, idsam_email),
          cie_display     = coalesce(ids_display_name, idu_display_name, idsam_display_name),
          cie_domain      = coalesce(ids_domain_name, idu_domain_name, idsam_domain_name),
          cie_sam         = coalesce(ids_sam_account_name, idu_sam_account_name, idsam_sam_account_name),
          cie_netbios     = coalesce(ids_netbios, idu_netbios, idsam_netbios)

  | alter idr_host_join_key = lowercase(hostname)
