adopted: true
commonfields:
  id: SOCFWPoVSend
  version: -1
name: SOCFWPoVSend
type: python
subtype: python3
dockerimage: demisto/python3:3.10.14.100715
enabled: true
tags:
  - SOCFramework
  - PoV
comment: |-
  Reads a PoV scenario data list, strips XSIAM system fields, rebases
  timestamps to now with window compression, normalizes source-specific
  fields, rotates suppression IDs, then sends events via the SOCFWPoVSender
  integration using the auto-resolved instance name from source_name.

  Instance names are locked in _INSTANCE_MAP and match xsoar_config.json:
    crowdstrike → socfw_pov_crowdstrike_sender
    proofpoint  → socfw_pov_tap_sender
    defender    → socfw_pov_defender_sender

  SEED MODE — creates the dataset on a new tenant before corr rules install:
    !SOCFWPoVSend list_name=SOCFWPoVData_CrowdStrike_TurlaCarbon_V1
      source_name=crowdstrike seed=true

  FULL REPLAY — run after corr rule packs are installed:
    !SOCFWPoVSend list_name=SOCFWPoVData_CrowdStrike_TurlaCarbon_V1
      source_name=crowdstrike
      global_min=2025-12-02T13:00:00Z
      global_max=2025-12-04T12:01:07Z

  Part of soc-framework-pov-test pack. Do not use on production tenants.
args:
  - name: list_name
    required: true
    description: Name of the XSIAM list containing scenario event data as a JSON array.
    supportedModules: []
  - name: source_name
    required: true
    description: |-
      Source type — auto-resolves the sender instance name.
      Supported: crowdstrike, proofpoint, defender.
    supportedModules: []
  - name: seed
    required: false
    description: |-
      Set to true to seed the dataset schema on a new tenant.
      Sends a single event with a 2020 timestamp — will not trigger
      correlation rules. Run BEFORE installing vendor corr rule packs.
    defaultValue: "false"
    supportedModules: []
  - name: compress_window
    required: false
    description: Compress original event timeline into this window. Default 2h.
    defaultValue: "2h"
    supportedModules: []
  - name: global_min
    required: false
    description: |-
      ISO timestamp of the earliest event across ALL sources in this scenario.
      Required for multi-source time alignment.
      Turla Carbon: 2025-12-02T13:00:00Z
    supportedModules: []
  - name: global_max
    required: false
    description: |-
      ISO timestamp of the latest event across ALL sources in this scenario.
      Required for multi-source time alignment.
      Turla Carbon: 2025-12-04T12:01:07Z
    supportedModules: []
outputs: []
fromversion: 6.10.0
script: ''
