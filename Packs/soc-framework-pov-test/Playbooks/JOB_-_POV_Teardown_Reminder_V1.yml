    scriptarguments:
      name:
        simple: "ACTION REQUIRED: Uninstall SOC Framework PoV Test Pack"
      severity:
        simple: "3"
      type:
        simple: "Other"
      details:
        simple: |-
          The SOC Framework PoV has ended. The soc-framework-pov-test pack must be
          uninstalled before this tenant goes to production or is handed off to PS.

          UNINSTALL CHECKLIST:
          ☐ 1. Delete the socfw_pov_crowdstrike_sender integration instance
                Settings → Integrations → search "socfw_pov" → delete both instances
          ☐ 2. Delete the socfw_pov_tap_sender integration instance
          ☐ 3. Uninstall soc-framework-pov-test from Marketplace
          ☐ 4. Confirm SOCFWPoVData_* lists are removed
          ☐ 5. Disable or delete this JOB (POV Teardown Reminder V1)
          ☐ 6. Set shadow_mode = false per action in SOCFrameworkActions_V3 to go live

          After completing the above, close this case.
