name: JOB - POV Teardown Reminder V1
description: |-
  Scheduled reminder to uninstall the SOC Framework PoV Test pack after the PoV ends.
  Creates a High severity case with the full uninstall checklist in the war room.

  SETUP: After installing soc-framework-pov-test, go to Automation → Jobs →
  POV Teardown Reminder V1 → set the schedule to fire on the last day of the PoV.

  Do not leave this pack installed on a tenant going to production.
