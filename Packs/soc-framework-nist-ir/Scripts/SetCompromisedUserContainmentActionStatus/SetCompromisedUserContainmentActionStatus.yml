  description: Normalized containment action status.
  type: string
- contextPath: CompromisedUserContainment.Actions.<action>.detail
  description: Optional detail for the containment action status.
  type: string
- contextPath: CompromisedUserContainment.Actions.<action>.timestamp
  description: UTC timestamp when the status was set.
  type: date
