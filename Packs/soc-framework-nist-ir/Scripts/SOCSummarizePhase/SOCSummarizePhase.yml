sourcescripid: SOCSummarizePhase
pswd: ''
signature: ''
scripttarget: 0
comment: |
  Project per-action records from <Phase>.Execution[] into phase-state
  context fields (action, attempted, isolated_hosts, status, etc.). Runs
  once near the end of an Endpoint Containment / Eradication / Recovery
  playbook, after wrapper calls and before the story write.

  Never overwrites existing non-empty values — safe to re-run if a phase
  is re-entered.
args:
  - name: phase
    description: NIST IR phase to summarize (containment | eradication | recovery)
    required: true
    auto: PREDEFINED
    predefined:
      - containment
      - eradication
      - recovery
    supportedModules: []
outputs:
  - contextPath: SOCFramework.PhaseSummary.containment
    description: Summary of fields written for Containment (when phase=containment)
    type: unknown
  - contextPath: SOCFramework.PhaseSummary.eradication
    description: Summary of fields written for Eradication (when phase=eradication)
    type: unknown
  - contextPath: SOCFramework.PhaseSummary.recovery
    description: Summary of fields written for Recovery (when phase=recovery)
    type: unknown
tags:
  - SOC
  - SOC_Framework
  - NIST_IR
  - Summarize
