inputs:
- key: ThreatStatus
  value:
    complex:
      root: alert.proofpointtapthreatinfomap
      accessor: threatStatus
      transformers:
      - operator: FirstArrayElement
      - operator: toLowerCase
  required: false
  description: 'Proofpoint TAP threat verdict: malicious / suspicious / cleared /
    falsePositive. Primary verdict driver. Source: alert.proofpointtapthreatinfomap.threatStatus'
  playbookInputQuery: null
- key: Classification
  value:
    simple: ${SOCFramework.Email.TAP.Classification}
  required: false
  description: 'Proofpoint TAP threat classification: phish / malware / spam / impostor.
    Set by Enrichment. Maps to Analysis.Email.category.'
  playbookInputQuery: null
- key: HighValueUserInvolved
  value:
    simple: ${SOCFramework.Email.HighValueUserInvolved}
  required: false
  description: True/False — set by Enrichment VIP check. Escalates recommendation
    to escalate_IR.
  playbookInputQuery: null
- key: ClickCount
  value:
    simple: ${SOCFramework.Email.TAP.ClickCount}
  required: false
  description: Number of URL clicks from Proofpoint TAP event query. Used in recommendation
    routing.
  playbookInputQuery: null
- key: DeliveredCount
  value:
    simple: ${SOCFramework.Email.TAP.DeliveredCount}
  required: false
  description: Number of delivered messages from Proofpoint TAP event query. Used
    in recommendation routing.
  playbookInputQuery: null
inputSections:
- inputs:
  - ThreatStatus
  - Classification
  name: Verdict Drivers
  description: Primary and secondary verdict signals
- inputs:
  - HighValueUserInvolved
  - ClickCount
  - DeliveredCount
  name: Recommendation Inputs
  description: Used only for advisory recommendation routing — not verdict determination
outputs:
- contextPath: Analysis.Email.verdict
  description: malicious / benign
  type: string
- contextPath: Analysis.Email.confidence
  description: high / medium / low
  type: string
- contextPath: Analysis.Email.category
  description: phish / malware / bec / spam / unknown
  type: string
- contextPath: Analysis.Email.response_recommended
  description: escalate_IR / search_and_purge / retract_message / quarantine / no_action
  type: string
- contextPath: Analysis.Email.internal_lateral_risk
  description: true if verdict=malicious, category=phish/malware, ExposureLevel=clicked,
    and RecipientScope=multi_user or tenant_wide
  type: boolean
outputSections:
- outputs:
  - Analysis.Email.verdict
  - Analysis.Email.confidence
  - Analysis.Email.category
  - Analysis.Email.response_recommended
  name: Verdict Contract
  description: Consumed by SOC Email Analysis_V3 orchestrator and passed to Containment
