id: SOC Email Verdict Resolution_V3
name: SOC Email Verdict Resolution_V3
version: -1
fromversion: 6.10.0
description: "Purpose\nDetermine the verdict, confidence, and category for an email\
  \ threat.\n\nThis playbook answers: is this malicious, how confident are we, and\
  \ what type of threat is it?\nIt does NOT answer: who was impacted or what action\
  \ to take at scale — that is SOC Email Exposure Evaluation_V3.\n\nPrimary signal:\
  \ Proofpoint TAP ThreatStatus (inputs.ThreatStatus)\n  malicious  → verdict=malicious,\
  \ confidence=high\n  suspicious → verdict=malicious, confidence=medium\n  default\
  \    → verdict=benign,    confidence=low\n\nSecondary signal: Analysis.Email.source_verdict\
  \ from DBot (set by Signal Characterization)\n  If DBot=malicious AND ThreatStatus\
  \ returned benign → elevate to suspicious/medium\n\nAdvisory recommendation is set\
  \ here as a non-executing signal to guide Containment.\nPriority order: escalate_IR\
  \ > search_and_purge > retract_message > quarantine > no_action"
tags:
- SOC
- SOC_Framework_Unified
- Detection & Analysis
- NIST 800-61
- Email
