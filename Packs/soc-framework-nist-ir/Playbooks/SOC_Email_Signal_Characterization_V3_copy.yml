inputs:
- key: ThreatType
  value:
    simple: ${SOCFramework.Artifacts.Email.ThreatType}
  required: false
  description: url / attachment — from SOCFramework.Artifacts.Email.ThreatType set
    by Foundation Normalize Artifacts
  playbookInputQuery: null
- key: ThreatURL
  value:
    simple: ${SOCFramework.Artifacts.Email.ThreatURL}
  required: false
  description: Threat URL from Proofpoint TAP alert
  playbookInputQuery: null
- key: ThreatIndicator
  value:
    complex:
      root: alert.proofpointtapthreatinfomap
      accessor: threat
      transformers:
      - operator: uniq
  required: false
  description: The threat indicator value — URL string or file hash depending on ThreatType
  playbookInputQuery: null
- key: SenderDomain
  value:
    simple: ${SOCFramework.Artifacts.Email.From}
  required: false
  description: Sender email address — domain extracted via @ substring for prevalence
    check
  playbookInputQuery: null
- key: SenderIP
  value:
    simple: ${issue.emailsenderip}
  required: false
  description: Sender IP address for prevalence check
  playbookInputQuery: null
inputSections:
- inputs:
  - ThreatType
  - ThreatURL
  - ThreatIndicator
  - SenderDomain
  - SenderIP
  name: General (Inputs group)
  description: Generic group for inputs
outputSections:
- outputs:
