name: SOC Email Signal Characterization_V3_copy
description: |-
  Purpose
  Determine what kind of email threat this is and build the indicator intelligence needed for verdict resolution.

  This is not verdict determination — that belongs in SOC Email Verdict Resolution_V3.
  This playbook answers: what is the nature of the threat object?

  Signal Types Produced:
    url_phish    — threat type is URL (phishing link, credential harvest, malicious redirect)
    file_malware — threat type is attachment (malicious file, hash-based detection)
    unknown      — threat type not identified from available artifacts

  Current Tasks:
    Characterize Threat Type
    Create IOC (URL or File)
    Assign DBot Score from Proofpoint TAP signal
    Extract domains from threat URL
    Rasterize URL (best-effort)
    Sender Domain Prevalence Check
    Sender IP Prevalence Check
    Tag Uncommon indicators
    Tag threat indicators with detection source
    Set Analysis.Email.signal_type
    Set Analysis.Email.source_verdict from DBot
tags:
- SOC
- SOC_Framework_Unified
- Detection & Analysis
- NIST 800-61
- Email
