  name: General (Outputs group)
  description: Generic group for outputs
outputs:
- contextPath: Analysis.Email.signal_type
  description: 'Behavioral classification of the email threat: url_phish / file_malware
    / unknown'
  type: string
- contextPath: Analysis.Email.source_verdict
  description: 'DBot-derived indicator verdict: malicious / suspicious / benign. Secondary
    signal — primary verdict comes from ThreatStatus in SOC Email Verdict Resolution_V3.'
  type: string
