inputs:
- key: ProductCategory
  value:
    simple: Endpoint
  required: false
  description: |
    Product category passed by SOC Eradication_V3 parent orchestrator.
  playbookInputQuery: null
- key: CompromiseLevel
  value:
    complex:
      root: Analysis.Endpoint.compromise_level
  required: false
  description: |
    Endpoint compromise level. Drives the phase-entry gate.
  playbookInputQuery: null
- key: Confidence
  value:
    complex:
      root: Analysis.Endpoint.confidence
  required: false
  description: |
    Analysis confidence score. Shown in the approval prompt context.
  playbookInputQuery: null
- key: SignalType
  value:
    complex:
      root: Analysis.Endpoint.signal_type
  required: false
  description: |
    Endpoint signal classification. Shown in the approval prompt.
  playbookInputQuery: null
- key: AgentID
  value:
    complex:
      root: SOCFramework.Artifacts.Endpoint.AgentID
  required: false
  description: |
    EDR agent identifier for the affected host. Required for
    soc-remove-persistence. If empty, that action is skipped.
  playbookInputQuery: null
- key: Hostname
  value:
    complex:
      root: SOCFramework.Artifacts.Endpoint.Hostname
  required: false
  description: |
    Hostname of the affected endpoint. Used in approval prompts.
  playbookInputQuery: null
- key: TargetHash
  value:
    complex:
      root: SOCFramework.Artifacts.Target.SHA256
  required: false
  description: |
    SHA256 hash of the malicious file target (primary). Resolves from
    ${SOCFramework.Artifacts.Target.SHA256}. Checked first; if empty,
    ProcessHash is used as fallback for soc-quarantine-files.
  playbookInputQuery: null
- key: ProcessHash
  value:
    complex:
      root: SOCFramework.Artifacts.Process.SHA256
  required: false
  description: |
    SHA256 hash of the initiator process (fallback). Resolves from
    ${SOCFramework.Artifacts.Process.SHA256}. Used when Target.SHA256 is
    not populated.
  playbookInputQuery: null
- key: TargetPath
  value:
    complex:
      root: SOCFramework.Artifacts.Target.Path
  required: false
  description: |
    File path of the malicious target (primary). Resolves from
    ${SOCFramework.Artifacts.Target.Path}. Checked first for soc-remove-file.
  playbookInputQuery: null
- key: ProcessPath
  value:
    complex:
      root: SOCFramework.Artifacts.Process.Path
  required: false
  description: |
    File path of the initiator process (fallback). Resolves from
    ${SOCFramework.Artifacts.Process.Path}. Used when Target.Path is empty.
  playbookInputQuery: null
- key: ProcessName
  value:
    complex:
      root: SOCFramework.Artifacts.Process.Name
  required: false
  description: |
    Process name for approval-prompt context and persistence cleanup
    parameters.
  playbookInputQuery: null
outputs:
- contextPath: Eradication.story
  description: One-line summary of what this phase did (or why it was skipped)
  type: string
- contextPath: Eradication.Execution
  description: Per-action execution records written by SOCCommandWrapper
  type: unknown
