name: SOC EndPoint Eradication_V3
description: |
  Endpoint category Eradication playbook (NIST IR 800-61 Phase 3: Eradication).

  Design:
    1. Phase Entry Gate. Reads CompromiseLevel via inputs. Skips the entire
       phase if the alert was evaluated as not_compromised or empty, writing
       a skip-story to Eradication.story.
    2. Three gated actions: remove-file, quarantine-files, remove-persistence.
       File-based actions artifact-gate on Target.* first (the malicious
       object), falling back to Process.* (the initiator process) when Target
       is empty. Each action is approval-gated via SOC_Approval_Gate_V3
       sub-playbook.
    3. SOCCommandWrapper handles Shadow Mode and writes Eradication.Execution[]
       per action.
    4. One Eradication.story write at the end.

  Reads (via inputs):
    - Analysis.Endpoint.compromise_level / .confidence / .signal_type
    - SOCFramework.Artifacts.Endpoint.AgentID / .Hostname
    - SOCFramework.Artifacts.Target.SHA256 / Target.Path (primary)
    - SOCFramework.Artifacts.Process.SHA256 / Process.Path (fallback)
    - SOCFramework.Artifacts.Process.Name

  Writes:
    - Approval.decision(per-call, via gate sub-playbook)
    - Eradication.Execution[] (per-action, via SOCCommandWrapper)
    - Eradication.story (single summary at phase end)

  Caller: SOC Eradication_V3 parent orchestrator routes to this playbook when
  inputs.ProductCategory = "Endpoint".
tags:
- SOC
- SOC_Framework_NIST_IR
- Eradication
- Endpoint
