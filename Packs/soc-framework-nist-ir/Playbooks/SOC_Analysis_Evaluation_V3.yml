  required: false
  description: ""
  playbookInputQuery: null
- key: case_user_count
  value:
    simple: ${Analysis.Endpoint.user_count}
  required: false
  description: ""
  playbookInputQuery: null
- key: primary_entity_name
  value:
    simple: ${SOCFramework.Artifacts.HostName}
  required: false
  description: ""
  playbookInputQuery: null
- key: persistence_type
