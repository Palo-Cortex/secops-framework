  required: false
  description: ""
  playbookInputQuery: null
- key: response_recommended
  value:
    simple: ${Analysis.Endpoint.response_recommended}
  required: false
  description: ""
  playbookInputQuery: null
- key: case_category
  value:
    complex:
      root: ${SOCFramework.Artifacts
      accessor: CategoryType}
      transformers:
      - operator: toLowerCase
