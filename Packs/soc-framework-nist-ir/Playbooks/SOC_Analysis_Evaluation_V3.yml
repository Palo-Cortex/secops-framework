      as \"${Analysis.Endpoint.compromise_level}\", based on execution correlation
      and observed MITRE ATT&CK behavioral patterns.\n\nActivity scope:\n• Hosts involved:
      ${Analysis.Endpoint.host_count}\n• Users involved: ${Analysis.Endpoint.user_count}\n•
      Environmental hash prevalence: ${Analysis.Endpoint.hash_prevalence_count}\n•
      Spread level: ${Analysis.Endpoint.spread_level}\n\nInvestigation confidence
      is \"${Analysis.Endpoint.confidence}\". \nResponse recommendation: ${Analysis.Endpoint.response_recommended}."
