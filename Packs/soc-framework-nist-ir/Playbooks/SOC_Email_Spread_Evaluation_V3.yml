outputs:
- contextPath: Analysis.Email.spread_level
  description: >-
    Canonical spread level for the email threat.
    Values: single_entity / limited_entity / multi_entity.
    Maps from Analysis.Email.RecipientScope — parallel to
    Analysis.Endpoint.spread_level so downstream phases share the same contract.
  type: string
- contextPath: Analysis.Email.persistence_type
  description: >-
    Post-delivery persistence indicator.
    inbox_rule_persistence — New-InboxRule detected in ms_o365_audit_raw
    for the primary recipient within 24h of delivery. Requires Eradication
    via soc-remove-inbox-rule.
    no_persistence_detected — no inbox rule evidence found.
  type: string
outputSections:
- outputs:
  - Analysis.Email.spread_level
  - Analysis.Email.persistence_type
  name: Spread Evaluation Contract
  description: >-
    Passed to Analysis Evaluation and Containment phase. spread_level drives
    Containment scope (single mailbox vs. tenant-wide purge). persistence_type
    gates Eradication inbox rule removal task.
