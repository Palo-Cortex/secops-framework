adopted: true
id: SOC Email Spread Evaluation_V3
name: SOC Email Spread Evaluation_V3
version: -1
fromversion: 6.10.0
description: |-
  NIST IR 800-61 — Analysis Phase — Email Spread & Persistence Evaluation

  Evaluates the blast radius and post-delivery persistence footprint of an email
  threat. Two concerns are addressed:

  1. Spread Level — maps Analysis.Email.RecipientScope (produced by Exposure
     Evaluation) to the canonical spread_level vocabulary (single_entity /
     limited_entity / multi_entity) so downstream phases consume the same
     contract as Endpoint.

  2. Inbox Rule Audit — queries ms_o365_audit_raw for New-InboxRule events
     tied to the primary recipient within 24 hours of the alert. A forwarding
     or auto-delete rule created after delivery is a known persistence indicator
     (see Turla / Carbon playbook). Sets Analysis.Email.persistence_type.

  Inputs consumed (produced by Exposure Evaluation):
    Analysis.Email.RecipientScope  — single_user / multi_user / tenant_wide
    SOCFramework.Email.TAP.MailboxCount — numeric recipient count

  Context key contract produced:
    Analysis.Email.spread_level     — single_entity / limited_entity / multi_entity
    Analysis.Email.persistence_type — inbox_rule_persistence / no_persistence_detected
tags:
- SOC
- SOC_Framework_Unified
- Detection & Analysis
- NIST 800-61
- Email
starttaskid: '0'
inputs:
- key: RecipientScope
  value:
    simple: ${Analysis.Email.RecipientScope}
  required: false
  description: >-
    Recipient scope produced by SOC Email Exposure Evaluation_V3.
    Values: single_user / multi_user / tenant_wide
  playbookInputQuery: null
- key: MailboxCount
  value:
    simple: ${SOCFramework.Email.TAP.MailboxCount}
  required: false
  description: Unique recipient mailbox count from TAP delivery query.
  playbookInputQuery: null
- key: Recipient
  value:
    simple: ${SOCFramework.Artifacts.Email.To}
  required: false
  description: >-
    Primary recipient UPN — used as the UserId filter in the O365 inbox
    rule audit XQL query.
  playbookInputQuery: null
- key: multi_user_threshold
  value:
    simple: '3'
  required: false
  description: >-
    MailboxCount at or above this value promotes spread_level to multi_entity.
    Default 3 — aligns with Endpoint high_host_count_per_case default.
  playbookInputQuery: null
inputSections:
- inputs:
  - RecipientScope
  - MailboxCount
  - Recipient
  - multi_user_threshold
  name: Spread Evaluation Inputs
  description: Inputs derived from Exposure Evaluation and TAP artifact context.
