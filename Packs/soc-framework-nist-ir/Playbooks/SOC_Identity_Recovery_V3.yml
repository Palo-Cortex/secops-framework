    taskid: id-ir-enable-user-0200
    type: regular
    task:
      id: id-ir-enable-user-0200
      version: -1
      name: Re-enable User Account - Universal Command
      scriptName: SOCCommandWrapper
      type: regular
      iscommand: false
      brand: ""
      playbooktaskmissingcomponent: null
    nexttasks:
      '#none#':
      - "3"
    scriptarguments:
      Action_Actor:
        simple: automation
      Phase:
