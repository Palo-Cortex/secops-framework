adopted: true
fromversion: 5.0.0
id: SOC Identity Recovery_V3
version: -1
name: SOC Identity Recovery_V3
description: |-
  Identity-specific recovery playbook. Runs inside SOC Recovery_V3 when
  SOCFramework.Product.category = "Identity".

  Flow:
    1. Eradication gate - only proceeds if Eradication.attempted = true
    2. Universal Command: soc-enable-user (task 200, Shadow Mode by default)
    3. Set Recovery context keys and story

  Shadow Mode: All vendor commands suppressed until PS flips SOCExecutionList_V3.
  Universal Command reads shadow_mode directly from lists.SOCExecutionList_V3.

  Context keys set:
    Recovery.attempted, Recovery.account_restored, Recovery.monitoring_required,
    Recovery.restore_method, Recovery.story
tags:
- SOC
- SOC_Framework_Unified
- Recovery
- NIST 800-61
- Identity
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: id-ir-start-0001
    type: start
    task:
      id: id-ir-start-0001
      version: -1
      name: ""
      iscommand: false
      brand: ""
      playbooktaskmissingcomponent: null
    nexttasks:
