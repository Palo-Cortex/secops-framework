    taskid: id-ir-erad-gate-0001
    type: condition
    task:
      id: id-ir-erad-gate-0001
      version: -1
      name: Did Eradication Happen?
      description: |-
        Only proceed with recovery if eradication was attempted.
        This prevents re-enabling accounts before credentials were reset.
      type: condition
      iscommand: false
      brand: ""
      playbooktaskmissingcomponent: null
    nexttasks:
      '#default#':
      - "10"
      yes:
      - "2"
    separatecontext: false
    conditions:
    - label: yes
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: ${Eradication.attempted}
            iscontext: true
          right:
            value:
              simple: "true"
    continueonerrortype: ""
    view: |-
      {
        "position": { "x": 480, "y": 190 }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false

