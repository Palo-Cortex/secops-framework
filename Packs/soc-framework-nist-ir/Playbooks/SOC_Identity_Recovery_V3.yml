      root: lists
      accessor: SOCExecutionList_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: SOC Identity Recovery_V3
      - operator: getField
        args:
          field:
            value:
              simple: shadow_mode
  required: false
  description: ""
  playbookInputQuery: null
- key: compromise_decision
  value:
    simple: ${Analysis.compromise_decision}
  required: false
  description: ""
  playbookInputQuery: null
