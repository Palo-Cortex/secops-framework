      action:
        simple: soc-enable-user
      list_name:
        simple: SOCFrameworkActions_V3
      output_key:
        simple: Recovery.Execution
      shadow_mode:
        simple: ${inputs.ShadowMode}
      tags:
        complex:
          root: inputs.ShadowMode
          transformers:
          - operator: If-Then-Else
            args:
              condition: {}
              conditionB: {}
              conditionInBetween: {}
              else:
                value:
                  simple: Recovery
              equals:
                value:
                  simple: inputs.ShadowMode
                iscontext: true
              lhs: {}
              lhsB: {}
              options: {}
              optionsB: {}
              rhs: {}
              rhsB: {}
              then:
