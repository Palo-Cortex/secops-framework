inputs:
- key: ProductCategory
  value:
    simple: Endpoint
  required: false
  description: |
    Product category passed by SOC Containment_V3 parent orchestrator. Used
    for routing by the parent; not consumed here.
  playbookInputQuery: null
- key: CompromiseLevel
  value:
    complex:
      root: Analysis.Endpoint.compromise_level
  required: false
  description: |
    Endpoint compromise level from Analysis. Resolves from
    ${Analysis.Endpoint.compromise_level} unless overridden by the parent.
    Drives the phase-entry gate — only "likely_compromised" and "suspicious"
    proceed; everything else skips with a story.
  playbookInputQuery: null
- key: Confidence
  value:
    complex:
      root: Analysis.Endpoint.confidence
  required: false
  description: |
    Analysis confidence score (low / medium / high). Resolves from
    ${Analysis.Endpoint.confidence} unless overridden by the parent. Shown
    in the approval prompt context summary.
  playbookInputQuery: null
- key: SignalType
  value:
    complex:
      root: Analysis.Endpoint.signal_type
  required: false
  description: |
    Endpoint signal classification (file_malware / behavior_memory /
    process_execution). Resolves from ${Analysis.Endpoint.signal_type}
    unless overridden by the parent. Shown in the approval prompt context.
  playbookInputQuery: null
- key: AgentID
  value:
    complex:
      root: SOCFramework.Artifacts.Endpoint.AgentID
  required: false
  description: |
    EDR agent identifier for the affected host. Resolves from
    ${SOCFramework.Artifacts.Endpoint.AgentID} unless overridden. If empty,
    soc-isolate-endpoint is skipped with no approval prompt raised.
  playbookInputQuery: null
- key: Hostname
  value:
    complex:
      root: SOCFramework.Artifacts.Endpoint.Hostname
  required: false
  description: |
    Hostname of the affected endpoint. Resolves from
    ${SOCFramework.Artifacts.Endpoint.Hostname}. Used in approval prompt
    artifact summary only.
  playbookInputQuery: null
- key: ProcessPID
  value:
    complex:
      root: SOCFramework.Artifacts.Process.PID
  required: false
  description: |
    Initiator process PID. Resolves from
    ${SOCFramework.Artifacts.Process.PID} unless overridden. If empty,
    soc-kill-process is skipped with no approval prompt raised.
  playbookInputQuery: null
- key: ProcessName
  value:
    complex:
      root: SOCFramework.Artifacts.Process.Name
  required: false
  description: |
    Initiator process name. Resolves from
    ${SOCFramework.Artifacts.Process.Name}. Used in approval prompt
    artifact summary only.
  playbookInputQuery: null
- key: TargetHash
  value:
    complex:
      root: SOCFramework.Artifacts.Target.SHA256
  required: false
  description: |
    SHA256 hash of the malicious file target. Resolves from
    ${SOCFramework.Artifacts.Target.SHA256} unless overridden. If empty,
    soc-block-indicators is skipped with no approval prompt raised.
  playbookInputQuery: null
outputs:
- contextPath: Containment.story
  description: One-line summary of what this phase did (or why it was skipped)
  type: string
- contextPath: Containment.Execution
  description: Per-action execution records written by SOCCommandWrapper
  type: unknown
