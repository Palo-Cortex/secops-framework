name: SOC Endpoint Containment_V3
description: |
  Endpoint category Containment playbook (NIST IR 800-61 Phase 3: Containment).

  Design:
    1. Phase Entry Gate. Reads Analysis.Endpoint.compromise_level. Skips the
       entire phase if the alert was evaluated as not_compromised, writing a
       skip-story to Containment.story.
    2. Three gated actions in sequence: isolate endpoint, kill process,
       block file hash. Each action is independently artifact-gated (skip if
       the artifact is absent) and approval-gated via SOC_Approval_Gate_V3
       sub-playbook (skip the wrapper call if the analyst denies).
    3. SOCCommandWrapper handles Shadow Mode and writes Containment.Execution[]
       per action. The playbook never reads or writes shadow_mode state.
    4. One Containment.story write at the end summarizing what happened.

  Reads:
    - SOCFramework.Artifacts.Endpoint.AgentID / .Hostname (host context)
    - SOCFramework.Artifacts.Process.PID / .Name (process-initiator context)
    - SOCFramework.Artifacts.Target.SHA256 (malicious-file context)
    - Analysis.Endpoint.compromise_level / .confidence / .signal_type
    - lists.SOCFrameworkActions_V3 (via SOC_Approval_Gate_V3 sub-playbook)

  Writes:
    - Approval.decision(per-call, via gate sub-playbook)
    - Containment.Execution[] (per-action, via SOCCommandWrapper)
    - Containment.story (single summary at phase end)

  Caller: SOC Containment_V3 parent orchestrator routes to this playbook when
  inputs.ProductCategory = "Endpoint".
tags:
- SOC
- SOC_Framework_NIST_IR
- Containment
- Endpoint
