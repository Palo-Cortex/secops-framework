inputs:
- key: ProductCategory
  value:
    simple: Endpoint
  required: false
  description: |
    Product category passed by SOC Recovery_V3 parent orchestrator.
  playbookInputQuery: null
- key: CompromiseLevel
  value:
    complex:
      root: Analysis.Endpoint.compromise_level
  required: false
  description: |
    Endpoint compromise level. Drives the phase-entry gate.
  playbookInputQuery: null
- key: Confidence
  value:
    complex:
      root: Analysis.Endpoint.confidence
  required: false
  description: |
    Analysis confidence score. Shown in the approval prompt context.
  playbookInputQuery: null
- key: SignalType
  value:
    complex:
      root: Analysis.Endpoint.signal_type
  required: false
  description: |
    Endpoint signal classification. Shown in the approval prompt.
  playbookInputQuery: null
- key: AgentID
  value:
    complex:
      root: SOCFramework.Artifacts.Endpoint.AgentID
  required: false
  description: |
    EDR agent identifier for the affected host. Required to call
    soc-deisolate-endpoint.
  playbookInputQuery: null
- key: Hostname
  value:
    complex:
      root: SOCFramework.Artifacts.Endpoint.Hostname
  required: false
  description: |
    Hostname of the affected endpoint. Used in approval prompt artifact
    summary.
  playbookInputQuery: null
- key: User
  value:
    complex:
      root: SOCFramework.Artifacts.User
  required: false
  description: |
    Affected user account. Required to call soc-enable-user.
  playbookInputQuery: null
- key: ContainmentIsolated
  value:
    complex:
      root: Containment.Execution
      filters:
      - - operator: isEqualString
          left:
            value:
              simple: Containment.Execution.action
            iscontext: true
          right:
            value:
              simple: soc-isolate-endpoint
  required: false
  description: |
    Filter of Containment.Execution[] where action = soc-isolate-endpoint.
    Non-empty means Containment attempted isolation and soc-deisolate-endpoint
    is eligible to run. Empty means there is nothing to un-isolate; the
    Recovery action for deisolate is skipped.
  playbookInputQuery: null
- key: ContainmentDisabledUser
  value:
    complex:
      root: Containment.Execution
      filters:
      - - operator: isEqualString
          left:
            value:
              simple: Containment.Execution.action
            iscontext: true
          right:
            value:
              simple: soc-disable-user
  required: false
  description: |
    Filter of Containment.Execution[] where action = soc-disable-user.
    Non-empty means Containment disabled the user and soc-enable-user is
    eligible. Empty means there is nothing to re-enable.
  playbookInputQuery: null
outputs:
- contextPath: Recovery.story
  description: One-line summary of what this phase did (or why it was skipped)
  type: string
- contextPath: Recovery.Execution
  description: Per-action execution records written by SOCCommandWrapper
  type: unknown
