name: SOC EndPoint Recovery_V3
description: |
  Endpoint category Recovery playbook (NIST IR 800-61 Phase 3: Recovery).

  Design:
    1. Phase Entry Gate. Reads CompromiseLevel via inputs. Skips the entire
       phase if not warranted.
    2. Each Recovery action is gated on TWO conditions:
       a. The corresponding artifact is still populated (AgentID, User)
       b. Containment attempted the inverse action (Containment.Execution
          contains an entry for the forward action)

       This prevents spurious undos such as de-isolating a host that was
       never isolated. That bug was observed in the previous Recovery
       implementation and is the primary motivation for this gate pattern.

    3. Two gated actions:
       - soc-deisolate-endpoint (gated on Containment.Execution contains
         soc-isolate-endpoint)
       - soc-enable-user (gated on Containment.Execution contains
         soc-disable-user)

    4. Each action is approval-gated via SOC_Approval_Gate_V3 sub-playbook.
    5. SOCCommandWrapper writes Recovery.Execution[] per action.
    6. One Recovery.story write at the end.

  Reads (via inputs):
    - Analysis.Endpoint.compromise_level / .confidence / .signal_type
    - SOCFramework.Artifacts.Endpoint.AgentID / .Hostname
    - SOCFramework.Artifacts.User
    - Containment.Execution filtered by action name (for undo gate)

  Writes:
    - Approval.decision(per-call, via gate sub-playbook)
    - Recovery.Execution[] (per-action, via SOCCommandWrapper)
    - Recovery.story (single summary at phase end)

  Caller: SOC Recovery_V3 parent orchestrator routes to this playbook when
  inputs.ProductCategory = "Endpoint".
tags:
- SOC
- SOC_Framework_NIST_IR
- Recovery
- Endpoint
