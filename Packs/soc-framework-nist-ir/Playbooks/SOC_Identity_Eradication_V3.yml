adopted: true
fromversion: 5.0.0
id: SOC Identity Eradication_V3
version: -1
name: SOC Identity Eradication_V3
description: "Identity-specific eradication playbook. Runs inside SOC Eradication_V3 when\nSOCFramework.Product.category = \"Identity\".\n\nFlow:\n  1. Response gate - skip if response_recommended = false\n\
  \  2. Compromise level check - likely_compromised runs reset + revoke; suspicious runs revoke only\n  3. Universal Command: soc-reset-password (Shadow Mode by default)\n  4. Universal Command: soc-revoke-tokens\
  \ (Shadow Mode by default)\n  5. Set Eradication context keys and story\n\nShadow Mode: All vendor commands suppressed until PS flips shadow_mode in SOCFrameworkActions_V3.\nUniversal Command reads shadow_mode directly\
  \ from lists.SOCFrameworkActions_V3.\n\nContext keys set:\n  Eradication.attempted, Eradication.credentials_reset, Eradication.tokens_revoked, Eradication.story"
tags:
- SOC
- SOC_Framework_Unified
- Eradication
- NIST 800-61
- Identity
