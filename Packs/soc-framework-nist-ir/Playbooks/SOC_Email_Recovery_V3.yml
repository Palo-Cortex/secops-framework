name: SOC Email Recovery_V3
description: |-
  NIST IR 800-61 — Recovery Phase — Email / SEG

  Validates eradication outcomes and handles false positive correction.

  Value Driver: VD1 (Reduce Risk) — confirms threat is neutralised before closing.
  Value Driver: VD3 (Efficiency) — automated recovery validation and FP correction eliminates manual post-alert cleanup steps.

  Gate: Eradication.attempted=true.
  All actions run through SOCCommandWrapper — shadow_mode read from SOCExecutionList_V3.

  Routing:
    Eradication not attempted → Recovery.status=not_required
    Eradication failed        → Recovery.status=eradication_failed, analyst flag
    False positive (verdict=benign) → soc-unblock-sender via SOCCommandWrapper
    Confirmed malicious       → Recovery.status=contained, monitoring_required=true

  UC: soc-unblock-sender (false positive path only)
  Note: soc-unblock-sender is not yet in SOCFrameworkActions_V3 — add to Email action group alongside soc-block-sender.

  Context keys produced:
    Recovery.status
    Recovery.monitoring_required
    Recovery.story
    Recovery.Execution
tags:
- SOC
- SOC_Framework_Unified
- Recovery
- NIST 800-61
- Email
