  - Recovery.Execution
  name: Recovery Contract
  description: Consumed by Value Metrics dashboard and post-incident review
outputs:
- contextPath: Recovery.status
  description: contained / not_required / eradication_failed / false_positive_cleared
  type: string
- contextPath: Recovery.monitoring_required
  description: true if ongoing monitoring is recommended post-recovery
  type: boolean
- contextPath: Recovery.story
  description: War room narrative summarizing recovery assessment
  type: string
- contextPath: Recovery.Execution
  description: SOCCommandWrapper execution record (false positive path only)
  type: unknown
