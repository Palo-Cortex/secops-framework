id: SOC Email Exposure Evaluation_V3
name: SOC Email Exposure Evaluation_V3
version: -1
fromversion: 6.10.0
description: "NIST IR 800-61 — Detection & Analysis — Email Exposure Evaluation\n\nAnswers: how far did this threat get, how\
  \ many users were affected, and does this involve a high-value target?\n\nValue Driver: VD1 (Reduce Risk) — blast radius\
  \ determines MTTC urgency.\nValue Driver: VD3 (Efficiency) — automated scope assessment replaces manual log review.\n\n\
  Execution:\n  1. XQL query — proofpoint_tap_v2_generic_alert_raw — 7-day window, filter by ThreatURL or ThreatID\n  2. Fan-out\
  \ extract: ClickCount, DeliveredCount, MessageID, MailboxCount\n  3. Classification — issue.proofpointtapclassification\n\
  \  4. ExposureLevel — clicked / delivered / blocked\n  5. RecipientScope — single / multi / tenant_wide (MapRangeValues\
  \ on MailboxCount)\n  6. High Value User check — against SOCFramework VIP Users list\n\nContext keys produced (consumed\
  \ by Containment and SOC Analysis Evaluation_V3):\n  SOCFramework.Email.TAP.ClickCount\n  SOCFramework.Email.TAP.DeliveredCount\n\
  \  SOCFramework.Email.TAP.MailboxCount\n  SOCFramework.Email.TAP.Classification\n  SOCFramework.Artifacts.Email.MessageID\n\
  \  SOCFramework.Email.HighValueUserInvolved\n  Analysis.Email.ExposureLevel\n  Analysis.Email.RecipientScope"
tags:
- SOC
- SOC_Framework_Unified
- Detection & Analysis
- NIST 800-61
- Email
