    type: regular
    task:
      id: b84acd4e-bc4b-48d9-82a8-881c7065411f
      version: -1
      name: XQL — Proofpoint TAP Delivery & Click Events
      description: 'Query proofpoint_tap_v2_generic_alert_raw for all click and delivery events matching this alert''s ThreatURL
        or ThreatID within a 7-day window.


        Returns: type (messages delivered / clicks permitted), threatID, recipient.

        Results fan-out to parallel set tasks for ClickCount, DeliveredCount, MessageID, and MailboxCount.'
      script: '|||xdr-xql-generic-query'
      type: regular
      iscommand: true
      brand: ''
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      '#none#':
      - '3'
      - '4'
      - '5'
      - '6'
    scriptarguments:
      query:
        simple: 'dataset = proofpoint_tap_v2_generic_alert_raw

          | filter type = "messages delivered" or type = "clicks permitted"

          | alter threatURL = threatsInfoMap -> [0].threatUrl

          | fields threatURL, type, messageID, threatID, recipient

          | filter threatURL = "${inputs.ThreatURL}" or threatID = "${inputs.ThreatID}"'
      query_name:
        simple: SOC Email Exposure Query
      time_frame:
        simple: 7 days
    separatecontext: false
    continueonerror: true
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 500,\n    \"y\": 365\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
