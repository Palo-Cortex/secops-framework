adopted: true
id: SOC Email Exposure Evaluation V3
name: SOC Email Exposure Evaluation V3
version: -1
fromversion: 5.0.0
description: Evaluates Proofpoint TAP email exposure via Universal Command. Determines click/delivered/blocked exposure level, recipient scope, and high-value user involvement. No XQL dependency.
tags:
  - Email
  - SOCFramework
  - Analysis
starttaskid: "0"

inputs: []

outputs: []

tasks:
  "0":
    id: "0"
    taskid: "0"
    type: start
    task:
      id: "0"
      name: ""
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "1"
    separatecontext: false
    continueonerrortype: ""

  "1":
    id: "1"
    taskid: "1"
    type: title
    task:
      id: "1"
      name: Query Delivery & Click Events
      type: title
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "2"
    separatecontext: false

  "2":
    id: "2"
    taskid: "2"
    type: condition
    task:
      id: "2"
      name: Is Click Event?
      description: Checks alert.type directly to determine whether the triggering event is a click or delivery event. No XQL required. If click, seeds click_count=1 before API call so count is never zero even if API interval misses this event.
      type: condition
      iscommand: false
      brand: ""
    conditions:
      - label: "YES"
        condition:
          - - operator: isEqualString
              left:
                value:
                  simple: ${alert.type}
                iscontext: true
              right:
                value:
                  simple: clicks permitted
              ignorecase: true
    nexttasks:
      "YES":
        - "3"
      '#default#':
        - "4"
    separatecontext: false

  "3":
    id: "3"
    taskid: "3"
    type: regular
    task:
      id: "3"
      name: Seed Click Count - Alert Is Click Event
      description: Sets click_count=1 as a floor. Subsequent Set Click Count task uses SetAndHandleEmpty which will only overwrite if the API returns a non-empty result. If API interval misses this event, the seed of 1 is preserved.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.click_count
      value:
        simple: "1"
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "4"
    separatecontext: false

  "4":
    id: "4"
    taskid: "4"
    type: regular
    task:
      id: "4"
      name: Get Email Events via Universal Command
      description: Calls soc-get-email-events via SOCCommandWrapper. Runs proofpoint-get-messages-delivered and proofpoint-get-clicks-permitted against the threat URL. shadow_mode=false so enrichment is never suppressed.
      script: SOCCommandWrapper
      iscommand: false
      brand: ""
    scriptarguments:
      action:
        simple: soc-get-email-events
      list_name:
        simple: SOCFrameworkActions_V3
    nexttasks:
      '#none#':
        - "5"
    separatecontext: false
    continueonerrortype: ""

  "5":
    id: "5"
    taskid: "5"
    type: regular
    task:
      id: "5"
      name: Get Email Forensics via Universal Command
      description: Calls soc-get-email-forensics via SOCCommandWrapper. Runs proofpoint-get-forensics with threatId and campaignId. shadow_mode=false so enrichment is never suppressed.
      script: SOCCommandWrapper
      iscommand: false
      brand: ""
    scriptarguments:
      action:
        simple: soc-get-email-forensics
      list_name:
        simple: SOCFrameworkActions_V3
    nexttasks:
      '#none#':
        - "6"
    separatecontext: false
    continueonerrortype: ""

  "6":
    id: "6"
    taskid: "6"
    type: regular
    task:
      id: "6"
      name: Set Click Count
      description: Count entries in UC.Email.Events.clicks_permitted array. SetAndHandleEmpty only overwrites if non-empty, preserving the seeded value of 1 if the API returned no results.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.click_count
      value:
        complex:
          root: UC.Email.Events.clicks_permitted
          transformers:
            - operator: count
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "7"
    separatecontext: false

  "7":
    id: "7"
    taskid: "7"
    type: regular
    task:
      id: "7"
      name: Set Delivered Count
      description: Count entries in UC.Email.Events.messages_delivered array.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.delivered_count
      value:
        complex:
          root: UC.Email.Events.messages_delivered
          transformers:
            - operator: count
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "8"
    separatecontext: false

  "8":
    id: "8"
    taskid: "8"
    type: regular
    task:
      id: "8"
      name: Set Mailbox Count
      description: Derives total mailbox count from delivered messages array length.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.mailbox_count
      value:
        complex:
          root: UC.Email.Events.messages_delivered
          transformers:
            - operator: count
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "9"
    separatecontext: false

  "9":
    id: "9"
    taskid: "9"
    type: regular
    task:
      id: "9"
      name: Set Message ID
      description: Store the Proofpoint GUID for downstream correlation.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.message_id
      value:
        complex:
          root: UC.Email.Events
          accessor: message_id
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "10"
    separatecontext: false

  "10":
    id: "10"
    taskid: "10"
    type: title
    task:
      id: "10"
      name: Set Classification
      type: title
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "11"
    separatecontext: false

  "11":
    id: "11"
    taskid: "11"
    type: regular
    task:
      id: "11"
      name: Set Email Classification
      description: Pulls classification label directly from the alert field (phish/malware/spam). No secondary lookup needed.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Classification
      value:
        complex:
          root: alert
          accessor: classification
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "12"
    separatecontext: false

  "12":
    id: "12"
    taskid: "12"
    type: title
    task:
      id: "12"
      name: Determine Exposure Level
      type: title
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "13"
    separatecontext: false

  "13":
    id: "13"
    taskid: "13"
    type: condition
    task:
      id: "13"
      name: Exposure Level?
      description: CLICKED takes priority over DELIVERED. Default with no clicks or deliveries is blocked.
      type: condition
      iscommand: false
      brand: ""
    conditions:
      - label: CLICKED
        condition:
          - - operator: isNotEmpty
              left:
                value:
                  simple: ${Email.Exposure.click_count}
                iscontext: true
            - operator: greaterThan
              left:
                value:
                  simple: ${Email.Exposure.click_count}
                iscontext: true
              right:
                value:
                  simple: "0"
      - label: DELIVERED
        condition:
          - - operator: isNotEmpty
              left:
                value:
                  simple: ${Email.Exposure.delivered_count}
                iscontext: true
            - operator: greaterThan
              left:
                value:
                  simple: ${Email.Exposure.delivered_count}
                iscontext: true
              right:
                value:
                  simple: "0"
    nexttasks:
      CLICKED:
        - "14"
      DELIVERED:
        - "15"
      '#default#':
        - "16"
    separatecontext: false

  "14":
    id: "14"
    taskid: "14"
    type: regular
    task:
      id: "14"
      name: Set Exposure Level - clicked
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.level
      value:
        simple: clicked
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "17"
    separatecontext: false

  "15":
    id: "15"
    taskid: "15"
    type: regular
    task:
      id: "15"
      name: Set Exposure Level - delivered
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.level
      value:
        simple: delivered
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "17"
    separatecontext: false

  "16":
    id: "16"
    taskid: "16"
    type: regular
    task:
      id: "16"
      name: Set Exposure Level - blocked
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.level
      value:
        simple: blocked
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "17"
    separatecontext: false

  "17":
    id: "17"
    taskid: "17"
    type: title
    task:
      id: "17"
      name: Determine Recipient Scope
      type: title
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "18"
    separatecontext: false

  "18":
    id: "18"
    taskid: "18"
    type: regular
    task:
      id: "18"
      name: Set Recipient Scope
      description: Classifies blast radius as targeted (1-5 mailboxes) or broad (more than 5). Feeds Analysis verdict severity and blast radius fields.
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.recipient_scope
      value:
        complex:
          root: Email.Exposure.mailbox_count
          transformers:
            - operator: if-then-else
              args:
                condition:
                  value:
                    simple: lte,5
                thenValue:
                  value:
                    simple: targeted
                elseValue:
                  value:
                    simple: broad
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "19"
    separatecontext: false

  "19":
    id: "19"
    taskid: "19"
    type: title
    task:
      id: "19"
      name: High Value User Check
      type: title
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "20"
    separatecontext: false

  "20":
    id: "20"
    taskid: "20"
    type: condition
    task:
      id: "20"
      name: Is Recipient a High Value User?
      description: Checks whether the alert username appears in the SOCFWHighValueUsers list. If matched, sets Email.Exposure.high_value_user=true to escalate priority in the parent Analysis playbook.
      type: condition
      iscommand: false
      brand: ""
    conditions:
      - label: "YES"
        condition:
          - - operator: inList
              left:
                value:
                  simple: ${alert.username}
                iscontext: true
              right:
                value:
                  simple: ${lists.SOCFWHighValueUsers}
                iscontext: true
    nexttasks:
      "YES":
        - "21"
      '#default#':
        - "22"
    separatecontext: false

  "21":
    id: "21"
    taskid: "21"
    type: regular
    task:
      id: "21"
      name: Set High Value User Involved
      script: SetAndHandleEmpty
      iscommand: false
      brand: ""
    scriptarguments:
      key:
        simple: Email.Exposure.high_value_user
      value:
        simple: "true"
      append:
        simple: "false"
    nexttasks:
      '#none#':
        - "22"
    separatecontext: false

  "22":
    id: "22"
    taskid: "22"
    type: title
    task:
      id: "22"
      name: Done
      type: title
      iscommand: false
      brand: ""
    separatecontext: false
