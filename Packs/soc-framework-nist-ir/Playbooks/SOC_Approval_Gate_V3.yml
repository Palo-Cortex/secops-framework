name: SOC Approval Gate_V3
description: |
  Reusable approval gate for SOC Framework Universal Command actions. Reads
  requires_approval from the action entry in SOCFrameworkActions_V3. If false,
  auto-approves immediately. If true, raises a manual collection task with rich
  artifact context, waits for analyst response, and returns the decision.

  Outputs (written to shared parent context):
    - Approval.decision: "approved" | "denied" | "auto-approved"
  Responder identity and decision timestamp are captured in the XSIAM case
  audit log on the collection task itself; no Approval.actor or
  Approval.decided_at context keys are written.

  Caller pattern: invoke this sub-playbook with action_name (and optional
  context inputs), then read ${Approval.decision} immediately after the call
  to route the next step. The wrapper call that follows should pass
  approval_decision=${Approval.decision} so the wrapper records it in the
  dataset.
tags:
- SOC
- SOC_Framework_Unified
- Approval
