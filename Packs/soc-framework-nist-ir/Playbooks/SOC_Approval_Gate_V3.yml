inputs:
- key: action_name
  value:
    simple: ""
  required: true
  description: |
    The soc-* action name being gated, e.g. "soc-kill-process". Used to look
    up requires_approval and prompt_artifact in SOCFrameworkActions_V3, and
    displayed in the approval prompt.
  playbookInputQuery: null
- key: phase
  value:
    simple: ""
  required: false
  description: |
    NIST IR phase context, e.g. "Containment" / "Eradication" / "Recovery".
    Displayed in the approval prompt.
  playbookInputQuery: null
- key: artifact_summary
  value:
    simple: ""
  required: false
  description: |
    Pre-resolved string showing the affected artifact for the prompt, e.g.
    "Process.PID = 5092 (svchost.exe)". The caller composes this from
    SOCFramework.Artifacts.* values for clarity.
  playbookInputQuery: null
- key: context_summary
  value:
    simple: ""
  required: false
  description: |
    Pre-resolved string showing case context for the prompt, e.g. "Compromise:
    likely_compromised, Score: 92, Signal: file_malware". Caller composes from
    Analysis.* values.
  playbookInputQuery: null
outputs:
- contextPath: Approval.decision
  description: '"approved" | "denied" | "auto-approved" — the gate decision'
  type: string
