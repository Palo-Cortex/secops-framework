inputs:
- key: ContainmentRequired
  value:
    simple: ${Containment.required}
  required: false
  description: Containment.required from Containment phase. true = malicious verdict
    confirmed, action taken.
  playbookInputQuery: null
- key: ResponseRecommended
  value:
    simple: ${Analysis.Email.response_recommended}
  required: false
  description: Advisory from Verdict Resolution. escalate_IR skips automated block.
  playbookInputQuery: null
- key: ShadowMode
  value:
    complex:
      root: lists
      accessor: SOCExecutionList_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: SOC Email Eradication_V3
      - operator: getField
        args:
          field:
            value:
              simple: shadow_mode
  required: false
  description: 'Shadow mode flag from SOCExecutionList_V3. true = log only. Default:
    true in all PoV deployments.'
  playbookInputQuery: null
inputSections:
- inputs:
  - ContainmentRequired
  - ResponseRecommended
  name: Containment Contract
  description: Gate and routing inputs from Containment phase
- inputs:
  - ShadowMode
  name: Execution Context
  description: Shadow mode from SOCExecutionList_V3
outputs:
- contextPath: Eradication.attempted
  description: true if eradication action was attempted
  type: boolean
- contextPath: Eradication.success
  description: true if eradication action succeeded
  type: boolean
- contextPath: Eradication.story
  description: War room narrative summarizing eradication result
  type: string
- contextPath: Eradication.Execution
  description: SOCCommandWrapper execution record — written to xsiam_socfw_ir_execution_raw
  type: unknown
outputSections:
- outputs:
  - Eradication.attempted
  - Eradication.success
  - Eradication.story
  - Eradication.Execution
  name: Eradication Contract
  description: Consumed by Recovery phase and Value Metrics dashboard
