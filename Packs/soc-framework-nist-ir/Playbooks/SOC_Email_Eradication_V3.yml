id: SOC Email Eradication_V3
name: SOC Email Eradication_V3
version: -1
fromversion: 6.10.0
description: "NIST IR 800-61 — Eradication Phase — Email / SEG\n\nRemoves the threat\
  \ source by blocking the sender domain/address to prevent future delivery of the\
  \ same campaign.\n\nValue Driver: VD1 (Reduce Risk) — attack surface reduction;\
  \ sender blocked before next campaign wave.\nValue Driver: VD4 (Secure Growth) —\
  \ persistent sender block closes the delivery vector at the SEG layer.\n\nGate:\
  \ Containment.required=true (malicious verdict was confirmed and actioned).\nAll\
  \ actions run through SOCCommandWrapper — shadow_mode read from SOCExecutionList_V3.\n\
  \nRouting:\n  Containment not required  → Eradication.attempted=false, no action\n\
  \  escalate_IR               → skip automated block, story for analyst\n  all other\
  \ containment actions → soc-block-sender via SOCCommandWrapper\n\nUC: soc-block-sender\n\
  Vendors: Mimecast / Microsoft Defender ATP / Proofpoint TAP v2\noutput_map: UC.Email.BlockSender.*\
  \ (pending SOCCommandWrapper.py update)\n\nContext keys produced:\n  Eradication.attempted\n\
  \  Eradication.success\n  Eradication.story\n  Eradication.Execution"
tags:
- SOC
- SOC_Framework_Unified
- Eradication
- NIST 800-61
- Email
