rule_id: 0
fromversion: 6.10.0
action: DATASET
alert_category: null
alert_description: null
alert_domain: null
alert_fields: {}
alert_name: null
alert_type: null
crontab: 0 2 * * *
dataset: socfw_identity_map
description: Builds the socfw_identity_map identity-resolution dataset from Cloud Identity
  Engine data (pan_dss_raw). Runs daily and keeps one canonical row per identity, keyed
  by SAM / GUID / SID / on-prem SID. Feeds the optional CIE identity-enrichment overlay in
  the SOC Framework vendor packs. Bind @PRIMARY_MAIL_DOMAIN to your primary mail domain and
  enable the rule to activate CIE enrichment.
drilldown_query_timeframe: null
execution_mode: SCHEDULED
global_rule_id: SOC IdentityResolve
is_enabled: false
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs: {}
name: SOC IdentityResolve
search_window: 25 hours
severity: null
simple_schedule: custom
suppression_duration: null
suppression_enabled: false
suppression_fields: []
timezone: America/New_York
user_defined_category: null
user_defined_severity: null
xql_query: |-
  dataset = pan_dss_raw
  | alter email = lowercase(email), upn = lowercase(upn), sam_account_name = lowercase(sam_account_name)
  | alter domain_rank = if(upn contains "@PRIMARY_MAIL_DOMAIN", 0, 1)

  // canonical per-identity dedup key. WAS: dedup on sam_account_name alone, which
  // collapsed every SAM-less identity (cloud / Entra / service principals) into one
  // row. coalesce keeps one row per real identity; guid covers cloud objects with no SAM.
  | alter identity_key = coalesce(sam_account_name, guid, sid, on_prem_sid)
  | dedup identity_key by asc domain_rank, desc record_generated_time

  | fields sid, on_prem_sid, netbios_and_sam_account_name, upn, email,
           sam_account_name, display_name, domain_name, type, dns_host_name, name, os,
           identity_key,
           // resolution / bridge keys
           guid, other_mails, proxy_addresses, agent_id, service_principal_names,
           // enrichment + liveness
           last_logon_timestamp, department, title, company_name, manager_raw, country
