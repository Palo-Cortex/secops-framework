rule_id: 0
fromversion: 6.10.0
action: DATASET
alert_category: null
alert_description: null
alert_domain: null
alert_fields:
alert_name: null
alert_type: null
crontab: 0 2 * * *
dataset: socfw_identity_map
name: SOC IdentityResolve
description: >-
  Builds the socfw_identity_map identity-resolution dataset from Cloud Identity
  Engine data (pan_dss_raw). Runs daily and keeps one canonical row per
  identity, keyed by SAM / GUID / SID / on-prem SID, with email-first values and
  a recipient_type classification. Feeds the optional CIE identity-enrichment
  overlay in the SOC Framework vendor packs. Bind @PRIMARY_MAIL_DOMAIN to your
  primary mail domain and set is_enabled true to activate CIE enrichment.
drilldown_query_timeframe: null
execution_mode: SCHEDULED
global_rule_id: SOC IdentityResolve
investigation_query_link: ''
is_enabled: false
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs: {}
search_window: 25 hours
severity: null
simple_schedule: custom
suppression_enabled: false
timezone: America/New_York
xql_query: |
  dataset = pan_dss_raw
  | alter email = lowercase(email), upn = lowercase(upn), sam_account_name = lowercase(sam_account_name)
  | alter domain_rank = if(upn contains "@PRIMARY_MAIL_DOMAIN", 0, 1)
  | alter identity_key = coalesce(sam_account_name, guid, sid, on_prem_sid)
  | dedup identity_key by asc domain_rank, desc record_generated_time
  | alter spn_str = arraystring(service_principal_names, ",")
  | alter acct_disabled = if(user_account_control != null and bitwise_and(user_account_control, 2) = 2, true, false)
  | alter recipient_type = if(spn_str != null and spn_str != "", "service", acct_disabled, "shared", "person")
  | fields
      sid, on_prem_sid, netbios_and_sam_account_name, upn, email, sam_account_name, display_name, domain_name, type, dns_host_name, name, os, identity_key, guid, other_mails, proxy_addresses, agent_id, service_principal_names, last_logon_timestamp, department, title, company_name, manager_raw, country, recipient_type
