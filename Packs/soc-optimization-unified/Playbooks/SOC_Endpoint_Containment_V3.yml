inputs:
- key: AutoContainment
  value:
    simple: "False"
  required: false
  description: |-
    Whether to execute containment plan (except isolation) automatically.
    The specific containment playbook inputs should also be set to 'True'.
  playbookInputQuery: null
- key: FileRemediation
  value:
    simple: Quarantine
  required: false
  description: "Choose 'Quarantine' or 'Delete'  to avoid file remediation conflicts.
    \nFor example, choosing 'Quarantine' ignores the 'Delete file' task under the
    eradication playbook and will execute only file quarantine."
  playbookInputQuery: null
- key: FeaturedHost
  value:
    simple: "False"
  required: false
  description: Is this a Featured Host?
  playbookInputQuery: null
- key: Verdict
  value:
    complex:
      root: ${Analysis
      accessor: verdict}
      transformers:
      - operator: toLowerCase
  required: false
  description: File Verdict from Enrichment
  playbookInputQuery: null
- key: SourceBrand
  value:
    simple: ${SOCFramework.Product.response}
  required: false
  description: This is the Source Brand for the Integration.  Set in the SOCProductCategoryMap_V3
    List.
  playbookInputQuery: null
- key: Confidence
  value:
    simple: ${Analysis.confidence}
  required: false
  description: ""
  playbookInputQuery: null
- key: ExecutionConfirmed
  value:
    simple: ${Analysis.compromise_decision.[0]}
  required: false
  description: ""
  playbookInputQuery: null
- key: CompromiseLevel
  value:
    complex:
      root: ${Analysis
      accessor: compromise_level}
      transformers:
      - operator: toLowerCase
  required: false
  description: ""
  playbookInputQuery: null
- key: CaseScore
  value:
    simple: ${Analysis.incident_score}
  required: false
  description: ""
  playbookInputQuery: null
- key: ShadowMode
  value:
    complex:
      root: lists
      accessor: SOCExecutionList_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: SOC Endpoint Containment_V3
      - operator: getField
        args:
          field:
            value:
              simple: shadow_mode
  required: false
  description: ""
  playbookInputQuery: null
inputSections:
- inputs:
  - AutoContainment
  - FileRemediation
  - FeaturedHost
  - Verdict
  - SourceBrand
  - Confidence
  - ExecutionConfirmed
  - CompromiseLevel
  - CaseScore
  - ShadowMode
  name: General (Inputs group)
  description: Generic group for inputs
outputSections:
- outputs:
  - Containment.status
  - Containment.isolated_hosts
  name: General (Outputs group)
  description: Generic group for outputs
outputs:
- contextPath: Containment.status
  description: What was the outcome of Containment
  type: unknown
- contextPath: Containment.isolated_hosts
  type: unknown
sourceplaybookid: Containment Plan
dirtyInputs: true
adopted: true
