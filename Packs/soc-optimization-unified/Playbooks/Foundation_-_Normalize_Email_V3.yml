    type: condition
    task:
      id: e0000000-0000-4000-a000-000000000001
      version: -1
      name: Email Sender available?
      description: |-
        Branches the normalization_source stamp. When issue.emailsender is
        populated this is a regular email alert (e.g. Proofpoint TAP,
        Microsoft Defender for Email) and the stamp is 'email'. Empty means
        a mail_listener-class ingestion and the stamp is 'mail_listener'.
        Both branches call the same data-driven script — only the stamp
        branch differs.
      type: condition
      iscommand: false
      brand: ""
    nexttasks:
      '#default#':
      - "3"
      "yes":
      - "2"
    separatecontext: false
    conditions:
    - label: "yes"
      condition:
      - - operator: isNotEmpty
          left:
            value:
              simple: issue.emailsender
            iscontext: true
          right:
            value: {}
