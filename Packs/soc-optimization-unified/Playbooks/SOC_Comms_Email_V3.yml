adopted: true
id: SOC Comms Email_V3
name: SOC Comms Email_V3
version: -1
fromversion: 6.10.0
description: "NIST IR 800-61  - Communications  - Email Verdict Notification\n\nFire-and-forget\
  \ Comms playbook. Notifies the person who reported the phishing email of the\n\
  verdict. Never blocks the main NIST IR flow.\n\nBehavior:\n  - If Verdict = malicious\
  \ AND PartOfCampaign: sends campaign-specific message\n  - If Verdict = malicious:\
  \ sends malicious verdict message\n  - If Verdict = benign: sends safe/cleared message\n\
  \  - If UserEngagement = false OR no ReporterEmail: skips silently\n\nValue Driver:\
  \ VD3 (Operational Efficiency)  - closes the loop with the reporter automatically,\n\
  eliminating the manual analyst step of composing verdict emails.\nValue Driver:\
  \ VD2 (Simplify Ops)  - removes per-alert manual communication from analyst workload.\n\
  \nRAF Phishing capabilities integrated:\n  - Reporter verdict email (benign/malicious/campaign)\
  \ from SOC - Email Containment - RAF\n    (tasks 16, 148, 150  - send-mail to reporteremailaddress)\n\
  \  - Campaign-aware message body (PartOfCampaign context check)\n  - User engagement\
  \ toggle (UserEngagement input gate)\n\nCallers:\n  SOC Email Analysis_V3 (task\
  \ 24  - Comms title -> this playbook)"
tags:
- SOC
- SOC_Framework_Unified
- Comms
- Email
- NIST 800-61
