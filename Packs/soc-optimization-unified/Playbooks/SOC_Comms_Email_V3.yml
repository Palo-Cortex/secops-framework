      description: 'Sends verdict notification email to the reporter. Message body:
        email reviewed and found safe. Fires directly via send-mail  - this is a communication
        action, not a security enforcement action, so Universal Command gating is
        not applied.'
      script: '|||send-mail'
      type: regular
      iscommand: true
      brand: ''
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
