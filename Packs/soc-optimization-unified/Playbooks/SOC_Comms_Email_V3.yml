inputs:
- key: Verdict
  '10':
    simple: ${Analysis.Email.verdict}
  required: false
  description: Analysis.Email.verdict  - malicious / benign. Drives notification routing.
  playbookInputQuery: null
- key: UserEngagement
  '10':
    simple: 'false'
  required: false
  description: Set to true to enable reporter notification. Default false  - analyst
    must explicitly enable per-deployment. Matches inputs.UserEngagement from RAF
    Containment playbook.
  playbookInputQuery: null
- key: ReporterEmail
  '10':
    simple: ${alert.reporteremailaddress}
  required: false
  description: Email address of the person who reported the phishing. Sourced from
    alert.reporteremailaddress (XSIAM native field set by Proofpoint TAP or user-reported
    phishing alert type).
  playbookInputQuery: null
- key: PartOfCampaign
  '10':
    simple: ${PartOfCampaign}
  required: false
  description: Campaign ID if this alert is part of a detected phishing campaign.
    Non-empty value triggers campaign-specific notification body.
  playbookInputQuery: null
- key: AlertName
  '10':
    simple: ${alert.name}
  required: false
  description: Alert name for email subject line.
  playbookInputQuery: null
- key: SendMailInstance
  '10': {}
  required: false
  description: Mail integration instance to use for send-mail commands. Leave empty
    to use the default instance.
  playbookInputQuery: null
