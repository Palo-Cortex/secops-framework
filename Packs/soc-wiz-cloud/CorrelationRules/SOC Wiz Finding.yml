rule_id: 0
fromversion: 6.10.0
tags:
  - SOCFramework
  - Passthrough
  - Cloud
  - Wiz
action: ALERTS
alert_category: User Defined
alert_description: $alert_description
alert_domain: DOMAIN_SECURITY
alert_fields:
  vendor: vendor_name
  product: product_name
  severity: severity
  alert_description: alert_description
  originalalertid: originalalertid
  originalalertname: originalalertname
  alert_name: alert_name
  username: actor_effective_username
  user_principal: user_principal
  agent_hostname: agent_hostname
  hostname: agent_hostname
  cloudprovider: cloud_provider
  cloudaccount: cloud_account
  cloudregion: cloud_region
  resourcename: resource_name
  resourcetype: resource_type
  resourceid: resource_id
  alertcategory: finding_type
  findingstatus: finding_status
  recommendation: recommendation
alert_name: $alert_name
alert_type: null
crontab: null
dataset: alerts
name: SOC Wiz Finding
description: >-
  Creates an XSIAM passthrough alert for each Wiz finding, normalized to the SOC
  Framework Cloud-category contract and routed through NIST IR.
drilldown_query_timeframe: ALERT
execution_mode: REAL_TIME
global_rule_id: SOC Wiz Finding
investigation_query_link: |-
  dataset = wiz_generic_alert_raw
  | filter json_extract_scalar(sourcerule, "$.id") = "$originalalertid"
  | fields *
is_enabled: true
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs: {}
search_window: null
severity: User Defined
simple_schedule: null
suppression_duration: 1 hours
suppression_enabled: true
suppression_fields:
- finding_id
timezone: null
user_defined_category: finding_type
user_defined_severity: severity
xql_query: |
  dataset = wiz_generic_alert_raw
  | filter _alert_data != null
  | alter
      vendor_name  = "Wiz",
      product_name = "Wiz Cloud",
      severity = lowercase(severity),
      finding_type   = type,
      finding_status = status,
      finding_id     = json_extract_scalar(sourcerule, "$.id"),
      finding_name   = json_extract_scalar(sourcerule, "$.name"),
      alert_description = coalesce(
          json_extract_scalar(sourcerule, "$.description"),
          json_extract_scalar(to_json_string(_alert_data), "$.alert_description")),
      recommendation = json_extract_scalar(sourcerule, "$.resolutionRecommendation"),
      cloud_provider = json_extract_scalar(entitysnapshot, "$.cloudPlatform"),
      cloud_account  = coalesce(
          json_extract_scalar(entitysnapshot, "$.subscriptionExternalId"),
          json_extract_scalar(entitysnapshot, "$.subscriptionName")),
      cloud_region   = json_extract_scalar(entitysnapshot, "$.region"),
      resource_name  = json_extract_scalar(entitysnapshot, "$.name"),
      resource_type  = coalesce(
          json_extract_scalar(entitysnapshot, "$.nativeType"),
          json_extract_scalar(entitysnapshot, "$.type")),
      resource_id    = coalesce(
          json_extract_scalar(entitysnapshot, "$.externalId"),
          json_extract_scalar(entitysnapshot, "$.id"))

  | alter agent_hostname = if(
      lowercase(coalesce(resource_type, "")) ~= "virtualmachine|instance|vm|compute|ec2",
      resource_name, null)
  | alter
      originalalertid     = finding_id,
      originalalertname   = finding_name,
      alert_name = concat(
          "[Cloud] ",
          coalesce(cloud_provider, "Cloud"), " | ",
          coalesce(resource_type, "Resource"), " | ",
          coalesce(finding_name, "Finding"))

  | alter es_is_identity = if(
      lowercase(coalesce(resource_type, "")) ~= "user_account|identity|service_account|user|group|service account|account",
      "true", "false")
  | alter actor_effective_username = if(es_is_identity = "true", lowercase(resource_name), null)
  | alter user_principal = null

  // ============== CIE ENRICHMENT (optional, OFF by default) ==============
  // Cloud Identity Engine enrichment is disabled. To enable it:
  //   1. Set this rule to a schedule (it ships REAL_TIME):
  //        execution mode = SCHEDULED
  //        crontab        = */10 * * * *
  //        search window  = 25 hours
  //        schedule label = 10 minutes
  //   2. Delete the /* and */ lines that wrap the block below.
  // The join coalesces socfw_identity_map values OVER the inline idr_* fields;
  // the alert-field mappings do not change. Requires SOC IdentityResolve.
  // ----------------------------------------------------------------------
  /*
  | filter timestamp_diff(time_frame_end(), _insert_time, "MINUTE") <= 15
  | alter cie_join_key = if(es_is_identity = "true", lowercase(resource_name), null)
  | join type = left (
      dataset = socfw_identity_map
      | filter type = "user"
      | alter cie_join_key = lowercase(display_name)
      | dedup cie_join_key by asc netbios_and_sam_account_name
      | fields cie_join_key,
               email                        as map_email,
               upn                          as map_upn,
               netbios_and_sam_account_name as map_netbios,
               sam_account_name             as map_sam,
               sid                          as map_sid,
               display_name                 as map_display,
               domain_name                  as map_domain
    ) as m cie_join_key = m.cie_join_key
  | alter actor_effective_username = if(es_is_identity = "true",
              lowercase(coalesce(map_email, map_upn, map_netbios, resource_name)),
              actor_effective_username),
          user_principal = coalesce(map_upn, map_email)
  | alter _time = _insert_time
  */
  // ===================== END CIE ENRICHMENT =============================
  | fields
      _time, vendor_name, product_name, severity, finding_type, finding_status, finding_id, finding_name, alert_description, recommendation, cloud_provider, cloud_account, cloud_region, resource_name, resource_type, resource_id, agent_hostname, alert_name, originalalertid, originalalertname, actor_effective_username, user_principal
