name: SOC Packs — Release

# ─────────────────────────────────────────────────────────────────
# push → main
#
# Job 1 · release     — build zip + create immutable GitHub release
# Job 2 · deploy      — deploy released zip to tenant
# Job 3 · catalog     — update pack_catalog.json [manual gate]
#                       Requires approval in pack-catalog-gate
#                       environment before running. Approve only
#                       after verifying the tenant deploy succeeded.
#
# Pre-merge tenant deploy lives in soc-packs-pr-gate.yml.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  PACKS_DIR: Packs
  DEMISTO_SDK_VERSION: "1.38.14"
  DEMISTO_SDK_IGNORE_CONTENT_WARNING: "1"

jobs:

  # ── JOB 1: BUILD ZIP + CREATE GITHUB RELEASE ────────────────────
  release:
    name: Build & release (production)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    environment:
      name: main
    outputs:
      packs: ${{ steps.changed.outputs.packs }}
      has_changes: ${{ steps.changed.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install demisto-sdk
        run: pip install "demisto-sdk==${DEMISTO_SDK_VERSION}"

      - name: Find packs with version bumps
        id: changed
        run: |
          python - << 'PY'
          import json, os, subprocess
          from pathlib import Path

          packs_dir = Path(os.environ["PACKS_DIR"])

          changed_files = subprocess.check_output(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"], text=True
          ).splitlines()

          changed = set()
          for f in changed_files:
              p = Path(f)
              if p.parts and p.parts[0] == str(packs_dir):
                  pack = p.parts[1] if len(p.parts) > 1 else None
                  if not pack:
                      continue
                  meta = packs_dir / pack / "pack_metadata.json"
                  if not meta.exists():
                      continue
                  try:
                      old = subprocess.check_output(
                          ["git", "show", f"HEAD~1:{packs_dir}/{pack}/pack_metadata.json"],
                          stderr=subprocess.DEVNULL, text=True
                      )
                      new_text = meta.read_text()
                      old_ver = json.loads(old).get("version") or json.loads(old).get("currentVersion")
                      new_ver = json.loads(new_text).get("version") or json.loads(new_text).get("currentVersion")
                      if old_ver != new_ver:
                          changed.add(pack)
                  except subprocess.CalledProcessError:
                      changed.add(pack)

          out = ",".join(sorted(changed))
          print("Changed packs:", out or "(none)")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"packs={out}\n")
              fh.write(f"has_changes={'true' if changed else 'false'}\n")
          PY

      - name: Build & publish production releases
        if: steps.changed.outputs.has_changes == 'true'
        env:
          CHANGED_PACKS: ${{ steps.changed.outputs.packs }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          python - << 'PY'
          import json, os, subprocess
          from pathlib import Path

          packs_dir = Path(os.environ["PACKS_DIR"])
          changed   = [p for p in os.environ["CHANGED_PACKS"].split(",") if p]
          repo      = os.environ["GITHUB_REPOSITORY"]
          repo_root = Path.cwd()
          dist      = Path("dist")
          dist.mkdir(exist_ok=True)

          def run(cmd, **kw):
              print("+", " ".join(cmd))
              subprocess.run(cmd, check=True, **kw)

          def gh(*args, check=True):
              return subprocess.run(["gh", *args], check=check)

          for pack in changed:
              pack_path = packs_dir / pack
              meta_path = pack_path / "pack_metadata.json"
              if not meta_path.exists():
                  print(f"{pack}: no pack_metadata.json, skipping")
                  continue

              meta    = json.loads(meta_path.read_text())
              version = meta.get("version") or meta.get("currentVersion") or ""
              if not version:
                  print(f"{pack}: no version, skipping")
                  continue

              tag   = f"{pack}-v{version}"
              asset = f"{pack}-v{version}.zip"

              if gh("release", "view", tag, check=False).returncode == 0:
                  raise RuntimeError(
                      f"Release tag {tag} already exists. "
                      f"Bump pack_metadata.json version to publish a new release."
                  )

              sentinel = dist / ".sentinel"
              sentinel.touch()
              sentinel_mtime = sentinel.stat().st_mtime

              run([
                  "demisto-sdk", "prepare-content",
                  "-i", str(pack_path),
                  "-o", str(dist),
                  "--marketplace", "marketplacev2",
              ], cwd=str(repo_root))

              sentinel.unlink(missing_ok=True)

              created = sorted(
                  (z for z in dist.rglob("*.zip") if z.stat().st_mtime >= sentinel_mtime),
                  key=lambda p: p.stat().st_mtime
              )

              if not created:
                  raise RuntimeError(f"{pack}: prepare-content produced no zip")

              final = dist / asset
              if final.exists():
                  final.unlink()
              created[-1].rename(final)
              print(f"Built: {final}")

              gh("release", "create", tag, str(final),
                 "-t", f"{pack} v{version}",
                 "-n", f"Production release for {pack} v{version}")

              url = f"https://github.com/{repo}/releases/download/{tag}/{asset}"
              print(f"Published: {url}")
          PY

      - name: No packs changed
        if: steps.changed.outputs.has_changes != 'true'
        run: echo "No version bumps detected — nothing to release."

  # ── JOB 2: DEPLOY TO TENANT ─────────────────────────────────────
  deploy:
    name: Deploy — tenant (post-merge)
    needs: release
    if: needs.release.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Checkout xsiam-pov-automation
        uses: actions/checkout@v4
        with:
          repository: annabarone/xsiam-pov-automation
          path: xsiam-pov-automation

      - name: Install POV requirements
        working-directory: xsiam-pov-automation
        run: pip install -r requirements.txt

      - name: Deploy to tenant
        working-directory: xsiam-pov-automation
        env:
          DEMISTO_BASE_URL: ${{ secrets.XSIAM_API_URL }}
          DEMISTO_API_KEY:  ${{ secrets.XSIAM_API_KEY }}
          XSIAM_AUTH_ID:    ${{ secrets.XSIAM_API_ID }}
          CONTENT_REPO_RAW_LINK: >-
            https://raw.githubusercontent.com/${{ github.repository }}/main/Packs/${{ needs.release.outputs.packs }}/xsoar_config.json
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          echo "Deploying: $CONTENT_REPO_RAW_LINK"
          printf 'yes\n' | python setup.py

  # ── JOB 3: UPDATE PACK CATALOG [MANUAL GATE] ────────────────────
  catalog:
    name: Update pack_catalog.json
    needs: [release, deploy]
    if: needs.release.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pack-catalog-gate   # ← requires your approval before running

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Update pack_catalog.json from pack_metadata.json
        run: |
          python tools/update_pack_catalog.py \
            --packs-dir Packs \
            --catalog pack_catalog.json \
            --org Palo-Cortex \
            --repo secops-framework \
            --ref refs/heads/main

      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pack_catalog.json
          if git diff --cached --quiet; then
            echo "pack_catalog.json unchanged — nothing to commit."
          else
            git commit -m "- Update pack_catalog.json [skip ci]"
            git push origin main
          fi
