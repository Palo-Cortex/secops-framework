name: SOC Packs — PR Gate

# ─────────────────────────────────────────────────────────────────
# Replaces: no-customer-data.yml + soc-packs-validate.yml
#
# Runs on every PR targeting main. All three jobs must pass before
# the PR can merge (configure as required checks in branch protection).
#
# Job 1 · scan       — no customer data in the diff
# Job 2 · validate   — demisto-sdk normalize + validate
# Job 3 · deploy-dev — build zip + install to dev tenant (pre-merge)
#
# Only packs with a version bump are processed. Version diff uses
# the merge-base (not HEAD^) so multi-commit feature branches work.
# ─────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  PACKS_DIR: Packs
  DEMISTO_SDK_VERSION: "1.38.14"
  DEMISTO_SDK_IGNORE_CONTENT_WARNING: "1"

# Cancel in-flight runs on the same PR when a new commit is pushed
concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  # ── JOB 1: CUSTOMER DATA SCAN ───────────────────────────────────
  scan:
    name: Scan — no customer data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Load customer identifiers
        run: |
          if [ -f "Lists/customer-identifiers.json" ]; then
            jq -r '.[]' Lists/customer-identifiers.json > patterns.txt
          else
            echo "" > patterns.txt
          fi

      - name: Scan diff for forbidden patterns
        run: |
          DIFF="$(git diff origin/main HEAD)"
          FOUND=0
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            if echo "$DIFF" | grep -qE "$pattern" 2>/dev/null; then
              echo "::error::Found customer data pattern: $pattern"
              FOUND=1
            fi
          done < patterns.txt
          [ "$FOUND" -eq 1 ] && exit 1
          echo "No customer identifiers detected."

  # ── SHARED: DETECT CHANGED PACKS ────────────────────────────────
  detect:
    name: Detect changed packs
    runs-on: ubuntu-latest
    outputs:
      packs: ${{ steps.changed.outputs.packs }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed packs (merge-base diff)
        id: changed
        run: |
          python - << 'PY'
          import io, json, os, subprocess
          from pathlib import Path

          packs_dir = Path(os.environ["PACKS_DIR"])
          packs = sorted(
              p.name for p in packs_dir.iterdir()
              if (p / "pack_metadata.json").is_file()
          )

          # merge-base diff: correct for feature branches with many commits
          base = subprocess.check_output(
              ["git", "merge-base", "HEAD", "origin/main"], text=True
          ).strip()

          changed = []
          for pack in packs:
              meta_path = packs_dir / pack / "pack_metadata.json"
              new_meta = json.loads(meta_path.read_text())
              new_ver = new_meta.get("version") or new_meta.get("currentVersion") or ""
              try:
                  blob = subprocess.check_output(["git", "show", f"{base}:{meta_path}"], text=True)
                  old_ver = json.load(io.StringIO(blob)).get("version") or ""
              except subprocess.CalledProcessError:
                  old_ver = ""
              if new_ver != old_ver:
                  print(f"{pack}: {old_ver} -> {new_ver}")
                  changed.append(pack)

          out = ",".join(changed)
          print("Changed packs:", out or "(none)")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"packs={out}\n")
              fh.write(f"has_changes={'true' if changed else 'false'}\n")
          PY

  # ── JOB 2: VALIDATE ─────────────────────────────────────────────
  validate:
    name: Validate — demisto-sdk
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install demisto-sdk
        run: pip install "demisto-sdk==${DEMISTO_SDK_VERSION}"

      - name: Verify SDK version
        run: |
          VER=$(demisto-sdk --version | grep -Eo '([0-9]+\.)+[0-9]+' | head -1)
          echo "SDK version = $VER"
          [ "$VER" = "${DEMISTO_SDK_VERSION}" ] || { echo "::error::Expected demisto-sdk ${DEMISTO_SDK_VERSION}, got $VER"; exit 1; }

      - name: Normalize + validate changed packs
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a PACKS <<< "$CHANGED_PACKS"
          for PACK in "${PACKS[@]}"; do
            [ -z "$PACK" ] && continue
            PACK_PATH="${PACKS_DIR}/${PACK}"
            echo "=== ${PACK} ==="
            python tools/normalize_ruleid_adopted.py --root "$PACK_PATH"
            demisto-sdk validate -i "$PACK_PATH" --no-docker-checks
          done

  # ── JOB 3: BUILD + DEV TENANT DEPLOY ────────────────────────────
  # Proves the pack installs in the tenant before merge is allowed.
  # Uses 'develop' environment secrets — prod tenant never touched by
  # an unreviewed PR.
  deploy-dev:
    name: Deploy — dev tenant (pre-merge)
    needs: [detect, validate]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment:
      name: develop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install demisto-sdk
        run: pip install "demisto-sdk==${DEMISTO_SDK_VERSION}"

      - name: Build pack zips (marketplacev2)
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p dist
          IFS=',' read -r -a PACKS <<< "$CHANGED_PACKS"

          for PACK in "${PACKS[@]}"; do
            [ -z "$PACK" ] && continue
            PACK_PATH="${PACKS_DIR}/${PACK}"
            META="${PACK_PATH}/pack_metadata.json"
            VER=$(python -c "import json; m=json.load(open('$META')); print(m.get('version') or m.get('currentVersion','0.0.0'))")
            ASSET="dist/${PACK}-v${VER}-dev.zip"

            echo "=== Building ${PACK} v${VER} ==="

            # Timestamp sentinel so we can identify what prepare-content creates
            SENTINEL=$(mktemp dist/.sentinel.XXXX)

            demisto-sdk prepare-content \
              -i "$PACK_PATH" \
              -o dist \
              --marketplace marketplacev2

            # Find zip created after the sentinel
            NEWEST=$(find dist -name "*.zip" -newer "$SENTINEL" | xargs ls -t 2>/dev/null | head -1 || true)
            rm -f "$SENTINEL"

            # Fallback: most recent zip with pack name
            if [ -z "$NEWEST" ]; then
              NEWEST=$(find dist -name "*${PACK}*.zip" | xargs ls -t 2>/dev/null | head -1 || true)
            fi
            if [ -z "$NEWEST" ]; then
              echo "::error::prepare-content produced no zip for ${PACK}"
              exit 1
            fi

            mv "$NEWEST" "$ASSET"
            echo "Built: $ASSET"
          done

      - name: Checkout xsiam-pov-automation
        uses: actions/checkout@v4
        with:
          repository: annabarone/xsiam-pov-automation
          path: xsiam-pov-automation

      - name: Install POV requirements
        working-directory: xsiam-pov-automation
        run: pip install -r requirements.txt

      - name: Deploy to dev tenant
        working-directory: xsiam-pov-automation
        env:
          DEMISTO_BASE_URL:  ${{ secrets.XSIAM_API_URL }}
          DEMISTO_API_KEY:   ${{ secrets.XSIAM_API_KEY }}
          XSIAM_AUTH_ID:     ${{ secrets.XSIAM_API_ID }}
          # xsoar_config.json read from the PR branch, not main
          CONTENT_REPO_RAW_LINK: >-
            https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref }}/Packs/${{ needs.detect.outputs.packs }}/xsoar_config.json
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          echo "Deploying to dev tenant: $DEMISTO_BASE_URL"
          echo "Config: $CONTENT_REPO_RAW_LINK"
          printf 'yes\n' | python setup.py
