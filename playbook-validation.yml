name: SOC Framework — Playbook Integrity

on:
  push:
    branches: ["main", "master", "develop"]
    paths:
      - "**/*.yml"
      - "xsoar_config.json"
      - "tools/validate_playbooks.py"
  pull_request:
    branches: ["main", "master", "develop"]
    paths:
      - "**/*.yml"
      - "xsoar_config.json"
      - "tools/validate_playbooks.py"
  workflow_dispatch:          # allow manual trigger from Actions tab
    inputs:
      strict:
        description: "Treat warnings as errors"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  validate:
    name: Validate Playbooks
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pyyaml

      # ── Run validator (human-readable output) ───────────────────────────
      - name: Run playbook validator
        id: validate
        run: |
          STRICT_FLAG=""
          if [[ "${{ github.event.inputs.strict }}" == "true" ]]; then
            STRICT_FLAG="--strict"
          fi
          python tools/validate_playbooks.py \
            --root . \
            --config xsoar_config.json \
            --verbose \
            $STRICT_FLAG

      # ── Emit JSON artifact for downstream dashboards ─────────────────────
      - name: Emit JSON report
        if: always()           # run even on validator failure
        run: |
          python tools/validate_playbooks.py \
            --root . \
            --config xsoar_config.json \
            --json > playbook-validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playbook-validation-report
          path: playbook-validation-report.json
          retention-days: 30

      # ── Annotate PR with findings ────────────────────────────────────────
      - name: Annotate PR with errors
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('playbook-validation-report.json', 'utf8'));
            } catch(e) {
              core.warning('Could not parse validation report for annotations');
              return;
            }

            const errors   = report.findings.filter(f => f.level === 'ERROR');
            const warnings = report.findings.filter(f => f.level === 'WARN');

            const lines = [];
            lines.push(`## 🔴 Playbook Validation Failed`);
            lines.push(`**${errors.length} error(s)** · **${warnings.length} warning(s)**\n`);

            if (errors.length) {
              lines.push('### Errors');
              errors.forEach(e => {
                lines.push(`- \`${e.check}\` · **${e.playbook}** — ${e.detail}`);
              });
            }

            if (warnings.length) {
              lines.push('\n### Warnings');
              warnings.forEach(w => {
                lines.push(`- \`${w.check}\` · **${w.playbook}** — ${w.detail}`);
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: lines.join('\n'),
            });
